main,.modal-bg{position:relative;z-index:1}
body{max-width:430px;margin:0 auto;padding:0;position:relative;height:var(--app-height,100dvh);overflow:hidden;display:flex;flex-direction:column}
.num,h1,h2,h3,h4,.bignum,.tab,.pill{font-family:'Barlow Condensed',sans-serif;letter-spacing:0.02em}
button{font-family:inherit;border:0;background:transparent;color:inherit;cursor:pointer;font-size:14px}
input,select,textarea{font-family:inherit;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:15px;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--green)}
#app-shell{display:flex;flex-direction:column;flex:1;overflow:hidden;position:relative;z-index:1}
.app-header{padding:18px 16px 8px;flex-shrink:0;background:var(--bg);position:static}
.app-title{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;letter-spacing:0.1em;color:var(--green);display:flex;align-items:center;gap:8px}
.app-title .dot{width:8px;height:8px;background:var(--green);border-radius:50%;box-shadow:0 0 8px var(--green)}
#subnav-wrap{flex-shrink:0;background:var(--bg);padding:0 16px 10px;overflow-x:auto;scrollbar-width:none;display:none;-webkit-mask-image:linear-gradient(to right,black 85%,transparent 100%);mask-image:linear-gradient(to right,black 85%,transparent 100%)}
#subnav-wrap::-webkit-scrollbar{display:none}
#scroll-body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(80px + env(safe-area-inset-bottom))}
.page{display:none;padding:8px 16px 24px;animation:fadein .15s ease}
.page.active{display:block}
@keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.subnav{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;background:transparent;padding:0}
.subnav::-webkit-scrollbar{display:none}
.pill{flex:0 0 auto;flex-shrink:0;padding:8px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:999px;color:var(--muted);font-size:13px;font-weight:600;text-transform:uppercase;white-space:nowrap}
.pill.active{background:var(--green);color:#06251A;border-color:var(--green)}
.bottomnav{position:static;flex-shrink:0;background:var(--surface);border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(5,1fr);padding:8px 4px calc(8px + env(safe-area-inset-bottom));z-index:100}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 2px;border-radius:10px;color:var(--muted);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em}
.nav-btn .ico{font-size:22px}
.nav-btn.active{color:var(--green)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px}
.card.tappable{cursor:pointer;transition:transform .1s,border-color .15s}
.card.tappable:active{transform:scale(.98)}
.card.tappable:hover{border-color:var(--border2)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row{display:flex;align-items:center;gap:10px}
.spacer{flex:1}
.muted{color:var(--muted);font-size:13px}
.muted2{color:var(--muted2);font-size:12px}
.label{font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);font-weight:600}
.bignum{font-family:'Barlow Condensed',sans-serif;font-size:42px;font-weight:700;line-height:1;color:var(--text)}

<body>
<div id="app-shell">
  <div class="app-header">
    <div class="app-title"><span class="dot"></span>MACROFORGE<span style="font-size:10px;font-weight:600;color:var(--muted);margin-left:8px;letter-spacing:0.04em">v3f</span></div>
    <button class="nav-btn" style="margin-left:auto;padding:4px 8px;color:var(--muted)" onclick="activateGroup('settings')" title="Settings"><span class="ico" style="font-size:18px">⚙️</span></button>

<script>
// ============= VERSION GATE =============
if(localStorage.getItem('mf_version')!=='1.5'){
  // preserve user data — only wipe on breaking schema changes
  localStorage.setItem('mf_version','1.5');
}

// ============= STATE / STORAGE =============
function dateKey(d){d=d||new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function isoWeekKey(d){d=new Date(d||new Date());const t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const dn=t.getUTCDay()||7;t.setUTCDate(t.getUTCDate()+4-dn);const ys=new Date(Date.UTC(t.getUTCFullYear(),0,1));const wk=Math.ceil(((t-ys)/86400000+1)/7);return t.getUTCFullYear()+'-W'+String(wk).padStart(2,'0');}
function S(k,fb){try{const v=localStorage.getItem(k);return v===null?fb:JSON.parse(v);}catch(e){return fb;}}
function SS(k,v){localStorage.setItem(k,JSON.stringify(v));}
function fkey(d){return 'mf_food_'+dateKey(d);}
function wkey(d){return 'mf_water_'+dateKey(d);}
function skey(d){return 'mf_sets_'+dateKey(d);}
function bkey(d){return 'mf_burned_'+dateKey(d);}
function spkey(d){return 'mf_supps_'+dateKey(d);}
function mckey(d){return 'mf_mealcheck_'+dateKey(d);}
function pkey(d){return 'mf_prep_'+isoWeekKey(d);}

const DEFAULT_SETTINGS = {calGoal:2200,protein:35,carbs:40,fat:25,weight:270,waterGoal:120,complianceMin:900,complianceMax:1300};
function getSettings(){return Object.assign({},DEFAULT_SETTINGS,S('mf_settings',{}));}
function saveSettings(s){SS('mf_settings',s);}

function macros(items){
  let k=0,p=0,c=0,f=0;
  items.forEach(i=>{
    k+=+(i.kcal||i.k||0);
    p+=+(i.protein||i.p||0);
    c+=+(i.carbs||i.c||0);
    f+=+(i.fat||i.f||0);
  });
  return{kcal:Math.round(k),protein:Math.round(p),carbs:Math.round(c),fat:Math.round(f)};
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>t.classList.remove('show'),1800);}

// ============= NAVIGATION =============
const PAGE_GROUP={home:'home',food:'nutrition',meals:'nutrition',plan:'nutrition',water:'nutrition',supps:'nutrition',log:'nutrition',workout:'training',guide:'training',recal:'training',verify:'training',weight:'body',fasting:'body',weekly:'body',milestone:'body',photos:'body',skin:'body',prep:'tools',shopping:'tools',backup:'settings',goals:'settings',lapse:'tools'};
const GROUP_PAGES={home:['home'],nutrition:['food','meals','water','supps','log'],training:['workout','guide','recal','verify'],body:['weight','fasting','weekly','milestone','photos','skin'],tools:['prep','shopping','lapse'],settings:['backup','goals']};
const LABEL={food:'Food',meals:'Meals',water:'Water',supps:'Supps',log:'Log',workout:'Workout',guide:'Guide',recal:'Recal',verify:'✓ Verify',weight:'Weight',fasting:'Fasting',weekly:'Weekly',milestone:'Milestones',photos:'Photos',skin:'Skin',prep:'Prep',shopping:'🛒 Shop',lapse:'Lapse',backup:'💾 Backup',goals:'🎯 Goals'};
let currentPage='home';
let lastSub=S('mf_lastsub',{nutrition:'food',training:'workout',body:'weight',tools:'prep',settings:'backup'});
// migrate any old 'plan' sub-page to 'meals' (now merged)
if(lastSub.nutrition==='plan'){lastSub.nutrition='meals';SS('mf_lastsub',lastSub);}

function getGroupForPage(p){return PAGE_GROUP[p]||'home';}
function setPage(page){if(!page)return;if(page==='plan')page='meals';currentPage=page;const g=getGroupForPage(page);if(g!=='home'){lastSub[g]=page;SS('mf_lastsub',lastSub);}activateGroup(g);}
function buildGroupNav(g){const wrap=document.getElementById('subnav-wrap');const nav=document.getElementById('subnav');if(g==='home'){wrap.style.display='none';nav.innerHTML='';return;}wrap.style.display='block';nav.innerHTML=GROUP_PAGES[g].map(p=>`<button class="pill ${p===currentPage?'active':''}" onclick="setPage('${p}')">${LABEL[p]}</button>`).join('');}
function activateGroup(g){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));if(getGroupForPage(currentPage)!==g){currentPage=g==='home'?'home':lastSub[g];}buildGroupNav(g);const el=document.getElementById('page-'+currentPage);if(el)el.classList.add('active');document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.group===g));activatePage(currentPage);const sb=document.getElementById('scroll-body');if(sb)sb.scrollTop=0;}
function activatePage(p){switch(p){case'home':renderHome();break;case'food':renderFood();break;case'meals':renderMeals();break;case'water':renderWater();break;case'supps':renderSupps();break;case'log':renderLog();break;case'workout':renderWorkout();break;case'guide':renderGuide();break;case'recal':renderRecal();break;case'verify':renderVerify();break;case'weight':renderWeight();break;case'fasting':renderFasting();break;case'weekly':renderWeekly();break;case'milestone':renderMilestone();break;case'photos':renderPhotos();break;case'skin':renderSkin();break;case'prep':renderPrep();break;case'shopping':renderShoppingList();break;case'backup':renderBackup();break;case'goals':renderGoals();break;case'lapse':renderLapse();break;}}

// ============= DATA: MEAL PLAN =============
const SMOOTHIE_ING=[
  {m:'1 scoop (35.8g)',n:'Ryse Loaded Protein',k:140,p:25,c:4,f:2.5},
  {m:'1 medium (118g)',n:'Banana (fresh, ripe)',k:105,p:1,c:27,f:0},

// ============= RENDER: HOME =============
function renderHome(){
  const s=getSettings();
  const food=S(fkey(),[]);
  const water=S(wkey(),[]);
  const burned=S(bkey(),0);
  const sets=S(skey(),{});
  const supps=S(spkey(),{});
  const wlog=S('mf_weightlog',[]);
  const lastW=wlog.length?wlog[wlog.length-1].weight:s.weight;
  const fast=S('mf_fast',{running:false});
  const fastTarget=S('mf_fast_target',16);
  // Recal baseline: use saved baseline or fall back to first entry
  const recalBase=S('mf_recal_base',270);
  const totalLost=recalBase-lastW;

  const fm=macros(food);
  const wm=water.reduce((a,b)=>a+b.oz,0);

  // calorie color
  const calPct=Math.min(100,Math.round(fm.kcal/s.calGoal*100));
  let calColor=calPct<70?'var(--green)':calPct<95?'var(--yellow)':'var(--red)';
  if(fm.kcal>s.calGoal)calColor='var(--red)';

  // streak: food log
  let streak=0;
  for(let i=0;i<60;i++){
    const d=new Date();d.setDate(d.getDate()-i);
    const v=S('mf_food_'+dateKey(d),[]);
    if(v.length>0)streak++;else if(i>0)break;
  }

  // lifts this week
  let liftCount=0;
  const wkStart=new Date();
  const dow=wkStart.getDay()||7;
  wkStart.setDate(wkStart.getDate()-(dow-1));
  for(let i=0;i<5;i++){
    const d=new Date(wkStart);d.setDate(d.getDate()+i);
    const v=S('mf_sets_'+dateKey(d),{});
    if(Object.keys(v).length>0)liftCount++;
  }

  // today workout
  const ti=todayIdx();
  const w=WORKOUTS[ti];
  const exDone=w.ex.map((e,i)=>(sets[ti+'-'+i]||0)>=e.s);
  const exDoneCount=exDone.filter(Boolean).length;
  const exTotal=w.ex.length;

  // supps count
  const suppsDone=Object.keys(supps).length;

  const now=new Date();
  const hour=now.getHours();
  const greet=hour<12?'Good morning':hour<18?'Good afternoon':'Good evening';
  const dateLabel=now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});

  // fast time
  let fastDisplay='Off',fastPct=0;
  if(fast.running){
    const el=(Date.now()-fast.startTime)/3600000;
    fastDisplay=Math.floor(el)+':'+String(Math.floor((el%1)*60)).padStart(2,'0');
    fastPct=Math.min(100,el/fastTarget*100);
  }

  const waterPct=Math.min(100,wm/s.waterGoal*100);
  const suppsPct=suppsDone/SUPPS.length*100;
  const exPct=exTotal?exDoneCount/exTotal*100:0;

  // ── Eat Window Countdown (12:30–20:00) ──
  const eatStart=12*60+30; // 12:30
  const eatEnd=20*60;      // 20:00
  const nowMin=hour*60+now.getMinutes();
  let eatWindowHtml='';
  if(nowMin>=eatStart&&nowMin<eatEnd){
    const minsLeft=eatEnd-nowMin;
    const hLeft=Math.floor(minsLeft/60),mLeft=minsLeft%60;
    eatWindowHtml=`<div class="eat-window-card">
      <div class="row"><div style="font-weight:700;font-size:14px">🍽 Eating Window Open</div><div class="spacer"></div><span style="font-family:'Barlow Condensed';font-weight:700;font-size:18px;color:var(--green)">${hLeft}h ${mLeft}m left</span></div>
      <div class="muted2" style="margin-top:4px">Window closes at 8:00 PM · 12:30–8:00 PM</div>
    </div>`;
  } else if(nowMin<eatStart){
    const minsTo=eatStart-nowMin;
    const hTo=Math.floor(minsTo/60),mTo=minsTo%60;
    eatWindowHtml=`<div class="eat-window-card" style="background:rgba(107,130,168,.08);border-color:rgba(107,130,168,.3)">

async function searchFood(){
  const q=document.getElementById('searchIn').value.trim();
  if(!q)return;
  const key=S('mf_api_key','');
  const div=document.getElementById('searchResults');
  div.innerHTML='<div class="muted" style="padding:10px">Searching…</div>';
  let foods=[];
  if(!key){document.getElementById('searchResults').innerHTML='<div class="muted2" style="padding:8px">No API key saved — add it above.</div>';return;}
  try{
    const r=await fetch(`https://api.nal.usda.gov/fdc/v1/foods/search?api_key=${encodeURIComponent(key)}&query=${encodeURIComponent(q)}&pageSize=15&dataType=Survey%20(FNDDS),SR%20Legacy,Foundation`);
    if(!r.ok){
      const errText=await r.text().catch(()=>'');
      console.error('USDA API error',r.status,errText);
      div.innerHTML=`<div class="muted2" style="padding:8px">Search failed — API returned ${r.status}. ${r.status===403?'Check API key.':r.status===429?'Rate limited — wait a moment.':'Try again.'}</div>`;
      return;
    }
    const data=await r.json();
    foods=data.foods||[];
  }catch(e){
    console.error('USDA fetch error:',e);
    div.innerHTML='<div class="muted2" style="padding:8px">Search failed — network error. Check console for details.</div>';
    return;
  }
  if(!foods.length){div.innerHTML='<div class="muted" style="padding:10px">No results.</div>';return;}
  div.innerHTML=foods.slice(0,15).map((f,i)=>{
    const k=nutVal(f,'Energy'),p=nutVal(f,'Protein'),c=nutVal(f,'Carbohydrate'),fa=nutVal(f,'Total lipid');
    window['_food_'+i]={name:f.description,k:k,p:p,c:c,f:fa};
    return `<div class="list-item" onclick="openPortion(${i})" style="cursor:pointer">
      <div style="flex:1"><div style="font-weight:600;font-size:13px">${f.description}</div>
      <div class="muted2">${Math.round(k)} kcal / 100g • P${p.toFixed(1)} C${c.toFixed(1)} F${fa.toFixed(1)}</div></div>
      <div style="color:var(--green);font-weight:700">+</div></div>`;
  }).join('');
}
function nutVal(f,name){const n=(f.foodNutrients||[]).find(x=>x.nutrientName&&x.nutrientName.toLowerCase().includes(name.toLowerCase()));return n?(+n.value||0):0;}
function openPortion(i){
  const f=window['_food_'+i];
  openModal(`<h3>${f.name}</h3>
    <div class="field"><label>Grams</label><input type="number" id="portionG" value="100" oninput="updatePortion(${i})"></div>
    <div id="portionMacros"></div>
    <div class="row" style="margin-top:14px"><button class="btn full" onclick="closeModal()">Cancel</button><button class="btn primary full" onclick="logPortion(${i})">Add</button></div>`);
  updatePortion(i);
}
function updatePortion(i){
  const f=window['_food_'+i];const g=+document.getElementById('portionG').value||0;const r=g/100;
  document.getElementById('portionMacros').innerHTML=`<div class="grid2" style="font-size:14px;text-align:center;margin-top:8px">
    <div class="card" style="margin:0;padding:10px"><div class="midnum">${Math.round(f.k*r)}</div><div class="muted2">kcal</div></div>
    <div class="card" style="margin:0;padding:10px"><div class="midnum" style="color:var(--protein)">${(f.p*r).toFixed(1)}g</div><div class="muted2">protein</div></div>

    <div class="card" style="margin:0;padding:10px"><div class="midnum" style="color:var(--fat)">${(f.f*r).toFixed(1)}g</div><div class="muted2">fat</div></div></div>`;
}
function logPortion(i){
  const f=window['_food_'+i];const g=+document.getElementById('portionG').value||0;const r=g/100;
  const log=S(fkey(),[]);
  log.push({name:f.name,grams:g,kcal:Math.round(f.k*r),protein:+(f.p*r).toFixed(1),carbs:+(f.c*r).toFixed(1),fat:+(f.f*r).toFixed(1)});
  SS(fkey(),log);closeModal();toast('Logged');renderFood();
}

// ============= RENDER: LOG =============
function buildComplianceScore(){
  // Look back 7 days (including today). A day counts as:
  //   'logged'   — has food entries
  //   'onTarget' — logged AND within ±100 kcal of calGoal
  //   'missed'   — no entries at all
  // Score = onTarget / 7 * 100 (including missed days as failures)
  const s=getSettings();
  const today=new Date();
  const days7=[];
  for(let i=0;i<7;i++){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const log=S('mf_food_'+dateKey(d),[]);
    const kcal=log.reduce((a,b)=>a+(+b.kcal||0),0);
    const logged=log.length>0;
    const onTarget=logged&&kcal>=s.complianceMin&&kcal<=s.complianceMax;
    const over=logged&&kcal>s.complianceMax;
    const under=logged&&kcal<s.complianceMin;
    days7.push({date:d,logged,kcal,onTarget,over,under,label:d.toLocaleDateString('en-US',{weekday:'short'})});
  }
  days7.reverse(); // oldest first for left-to-right display
  const loggedCount=days7.filter(d=>d.logged).length;
  const onTargetCount=days7.filter(d=>d.onTarget).length;
  const score=Math.round(onTargetCount/7*100);
  const scoreColor=score>=85?'var(--green)':score>=57?'var(--yellow)':'var(--red)';
  const scoreLabel=score>=85?'Strong':score>=57?'Building':'Needs work';
  // Protein compliance: days where logged protein >= 90% of protein goal
  const pGoal=Math.round(s.calGoal*s.protein/100/4);
  const pCompliant=days7.filter(d=>{
    if(!d.logged)return false;
    const log=S('mf_food_'+dateKey(d.date),[]);
    const p=log.reduce((a,b)=>a+(+b.protein||0),0);
    return p>=pGoal*0.9;
  }).length;
  return {days7,loggedCount,onTargetCount,score,scoreColor,scoreLabel,pCompliant,pGoal,complianceMin:s.complianceMin,complianceMax:s.complianceMax};
}

    const border=d.onTarget?'var(--green)':d.over?'var(--red)':d.under?'var(--yellow)':'var(--border2)';
    const icon=d.onTarget?'✓':d.over?'↑':d.under?'↓':'–';

  return `<div class="card" style="border-color:${c.scoreColor}">

    <div style="display:flex;gap:10px;font-size:11px;color:var(--muted2)">

function renderLog(){
  const s=getSettings();
  const filter=window._logFilter||'all';
  const exp=window._logExp=window._logExp||{};
  // collect all food keys
  const keys=Object.keys(localStorage).filter(k=>k.startsWith('mf_food_'));
  const days=keys.map(k=>{const ds=k.replace('mf_food_','');const parts=ds.split('-').map(n=>+n);return{key:k,date:new Date(parts[0],parts[1]-1,parts[2]),log:S(k,[])};}).filter(d=>d.log.length).sort((a,b)=>b.date-a.date);
  const now=new Date();
  let filtered=days;
  if(filter==='week'){const wk=new Date(now);wk.setDate(wk.getDate()-7);filtered=days.filter(d=>d.date>=wk);}
  if(filter==='month'){const m=new Date(now);m.setMonth(m.getMonth()-1);filtered=days.filter(d=>d.date>=m);}

  let streak=0;
  for(let i=0;i<60;i++){const d=new Date();d.setDate(d.getDate()-i);const v=S('mf_food_'+dateKey(d),[]);if(v.length>0)streak++;else if(i>0)break;}

  const compliance=buildComplianceScore();

  document.getElementById('log-body').innerHTML=`
    ${renderComplianceCard(compliance)}
    <div class="grid2" style="gap:8px;margin-bottom:12px">
      <div class="card" style="margin:0;text-align:center;padding:12px">
        <div class="muted">Logging Streak</div>
        <div class="bignum" style="color:var(--green);margin:4px 0">🔥 ${streak}</div>
        <div class="muted2">day${streak===1?'':'s'}</div>
      </div>
      <div class="card" style="margin:0;text-align:center;padding:12px">
        <div class="muted">Protein Hit Rate</div>
        <div class="bignum" style="color:var(--protein);margin:4px 0">${compliance.pCompliant}<span style="font-size:20px;color:var(--muted)">/7</span></div>
        <div class="muted2">≥${compliance.pGoal}g days</div>
      </div>
    </div>
    <div class="row" style="margin-bottom:10px;gap:4px">
      <button class="pill ${filter==='all'?'active':''}" onclick="setLogFilter('all')">All Time</button>
      <button class="pill ${filter==='month'?'active':''}" onclick="setLogFilter('month')">This Month</button>
      <button class="pill ${filter==='week'?'active':''}" onclick="setLogFilter('week')">This Week</button>
    </div>
    ${filtered.length?filtered.map(d=>{
      const m=macros(d.log);const diff=m.kcal-s.calGoal;const tag=Math.abs(diff)<=100?'<span class="tag ok">On Target</span>':diff>0?'<span class="tag bad">Over</span>':'<span class="tag warn">Under</span>';
      const dlabel=d.date.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
      const open=exp[d.key];
      return `<div class="expand-card">
        <div class="expand-head" onclick="toggleLog('${d.key}')">
          <div style="flex:1"><div style="font-weight:700">${dlabel}</div><div class="muted2">${d.log.length} items · ${m.kcal} kcal · P${m.protein} C${m.carbs} F${m.fat}</div></div>
          ${tag}<div class="chev ${open?'open':''}">▾</div>
        </div>
        <div class="expand-body ${open?'show':''}">
          ${d.log.map(f=>`<div class="ing-row"><div class="m">${f.grams?f.grams+'g':'—'}</div><div>${f.name}</div><div class="mac">${f.kcal}k · P${f.protein}</div></div>`).join('')}
        </div>
      </div>`;
    }).join(''):'<div class="empty">No food logged in this range.</div>'}
  `;
}

function setWDay(i){window._wDay=i;renderWorkout();}
function completeSet(di,ei,total,rest){const sets=S(skey(),{});const k=di+'-'+ei;const cur=sets[k]||0;sets[k]=cur>=total?0:cur+1;SS(skey(),sets);if(sets[k]>0&&sets[k]<=total)startRest(rest);renderWorkout();}
function resetSets(di){if(!confirm('Reset all sets for today?'))return;const sets=S(skey(),{});Object.keys(sets).forEach(k=>{if(k.startsWith(di+'-'))delete sets[k];});SS(skey(),sets);renderWorkout();}
function calcMET(){const w=+document.getElementById('metW').value||0;const m=+document.getElementById('metM').value||0;const t=+document.getElementById('metT').value||0;const kg=w*0.453592;const k=Math.round(m*kg*3.5*(t/60)/200*60);document.getElementById('metResult').innerHTML=`<div class="card" style="margin:0;text-align:center"><div class="bignum" style="color:var(--carbs)">${k}</div><div class="muted2">kcal burned</div><button class="btn primary full" style="margin-top:8px" onclick="logBurn(${k})">Log Burn</button></div>`;}
function logBurn(k){const cur=S(bkey(),0);SS(bkey(),cur+k);toast('Burn logged: +'+k+' kcal');renderWorkout();}
function openExNotes(di,ei){
  const w=WORKOUTS[di];const e=w.ex[ei];const notes=S('mf_exnotes',{});
  const today=dateKey();

function resetRecalBase(){const wlog=S('mf_weightlog',[]);const cur=wlog.length?wlog[wlog.length-1].weight:getSettings().weight;SS('mf_recal_base',cur);toast('Baseline reset to '+cur+' lbs');renderRecal();}
function calcRecal(){
  const w=+document.getElementById('rcW').value;
  const ft=+document.getElementById('rcFt').value;
  const inch=+document.getElementById('rcIn').value;
  const age=+document.getElementById('rcAge').value;
  const sex=document.getElementById('rcSex').value;
  const act=+document.getElementById('rcAct').value;
  SS('mf_rc_ft',ft);SS('mf_rc_in',inch);SS('mf_rc_age',age);SS('mf_rc_sex',sex);SS('mf_rc_act',act);
  const kg=w*0.453592;const cm=(ft*12+inch)*2.54;
  const bmr=Math.round(sex==='m'?10*kg+6.25*cm-5*age+5:10*kg+6.25*cm-5*age-161);
  const tdee=Math.round(bmr*act);const target=tdee-500;
  const p=Math.round(w);const fG=Math.round(target*0.25/9);const cG=Math.round((target-p*4-fG*9)/4);
  document.getElementById('recalResult').innerHTML=`
    <div class="card" style="margin:0">
      <div class="ing-row"><div>BMR</div><div></div><div class="mac">${bmr} kcal</div></div>

      <div class="ing-row" style="font-weight:700"><div>Target</div><div></div><div class="mac" style="color:var(--green)">${target} kcal</div></div>
      <div class="ing-row"><div>Protein</div><div></div><div class="mac" style="color:var(--protein)">${p}g</div></div>
      <div class="ing-row"><div>Carbs</div><div></div><div class="mac" style="color:var(--carbs)">${cG}g</div></div>
      <div class="ing-row"><div>Fat</div><div></div><div class="mac" style="color:var(--fat)">${fG}g</div></div>
    </div>
    <button class="btn primary full" style="margin-top:10px" onclick="applyRecal(${target},${p},${cG},${fG},${w})">Apply to Goals</button>
  `;
}
function applyRecal(target,p,c,f,w){
  const s=getSettings();
  const pct_p=Math.round(p*4/target*100);
  const pct_c=Math.round(c*4/target*100);
  const pct_f=100-pct_p-pct_c;
  s.calGoal=target;s.protein=pct_p;s.carbs=pct_c;s.fat=pct_f;s.weight=w;
  saveSettings(s);SS('mf_last_recal_weight',w);toast('Goals updated');renderRecal();
}

function renderWeight(){
  const wlog=S('mf_weightlog',[]).slice().sort((a,b)=>new Date(a.date)-new Date(b.date));
  const cur=wlog.length?wlog[wlog.length-1].weight:0;
  const start=Math.max(wlog.length?wlog[0].weight:270, 270); // 270 is program start
  const lost=start-cur;const goal=180;
  const togo=cur-goal;const journey=lost>0&&(start-goal)>0?Math.min(100,lost/(start-goal)*100):0;

  // 7-day rolling rate
  let ratePillHtml='';
  if(wlog.length>=2){
    const now7=new Date();now7.setDate(now7.getDate()-7);
    const recent=wlog.filter(e=>new Date(e.date)>=now7);

      const weekLoss=recent[0].weight-recent[recent.length-1].weight;

      const rate=((weekLoss/days)*7).toFixed(2);

      <div class="card" style="margin:0"><div class="label">Current</div><div class="midnum">${cur||'—'}<span style="font-size:14px;color:var(--muted)"> lb</span></div></div>
      <div class="card" style="margin:0"><div class="label">Lost</div><div class="midnum" style="color:var(--green)">${lost>0?'-'+lost.toFixed(1):'0'}<span style="font-size:14px;color:var(--muted)"> lb</span></div></div>
      <div class="card" style="margin:0"><div class="label">To Goal (${goal})</div><div class="midnum" style="color:var(--yellow)">${togo>0?togo.toFixed(1):'✓'}<span style="font-size:14px;color:var(--muted)"> lb</span></div></div>
      <div class="card" style="margin:0"><div class="label">Entries</div><div class="midnum">${wlog.length}</div></div>
    </div>
    <div class="card">
      <div class="row"><h3>Journey</h3><div class="spacer"></div><div class="midnum" style="color:var(--green)">${Math.round(journey)}%</div></div>
      <div class="bar thick" style="margin-top:6px"><div style="width:${journey}%;background:var(--green)"></div></div>
      ${ratePillHtml}
      <div class="muted2" style="margin-top:8px;font-size:11px">Target rate: 1.0–1.5 lbs/wk · Faster risks muscle loss · Slower = adjust calories</div>
    </div>
    <div class="card"><h3>Weight Trend</h3><canvas id="wChart"></canvas></div>
    <div class="card"><h3>Log (${wlog.length})</h3>
      ${wlog.length?wlog.slice().reverse().slice(0,30).map((e,i)=>{
        const realIdx=wlog.length-1-i;
        const isSun=new Date(e.date.replace(/-/g,'/')).getDay()===0;
        return `<div class="list-item"><div style="flex:1"><div style="font-weight:600">${(+e.weight).toFixed(1)} lb ${isSun?'<span class="tag ok" style="font-size:9px">SUN</span>':''}</div><div class="muted2">${e.date}</div></div><button class="del" onclick="delWeight(${realIdx})">✕</button></div>`;
      }).join(''):'<div class="empty">No entries yet.</div>'}
    </div>
  `;
  drawWeightChart(wlog);
}
function logWeight(){const v=+document.getElementById('wIn').value;if(!v){toast('Enter weight');return;}const log=S('mf_weightlog',[]);log.push({date:dateKey(),weight:v});SS('mf_weightlog',log);const s=getSettings();s.weight=v;saveSettings(s);toast('Weight logged');renderWeight();}
function delWeight(i){const log=S('mf_weightlog',[]);log.splice(i,1);SS('mf_weightlog',log);renderWeight();}
function drawWeightChart(data){
  const c=document.getElementById('wChart');if(!c||!data.length)return;
  const dpr=window.devicePixelRatio||1;const w=c.clientWidth;const h=200;
  c.width=w*dpr;c.height=h*dpr;
  const ctx=c.getContext('2d');ctx.scale(dpr,dpr);
  const pad=30;const cw=w-pad*2;const ch=h-pad*2;
  const ws=data.map(d=>+d.weight);
  const goal=180;
  const min=Math.min(...ws,goal)-2;const max=Math.max(...ws)+2;
  const x=i=>data.length>1?pad+(i/(data.length-1))*cw:pad+cw/2;
  const y=v=>pad+(1-(v-min)/(max-min))*ch;
  // axes
  ctx.strokeStyle='#1E3A5F';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(pad,pad);ctx.lineTo(pad,pad+ch);ctx.lineTo(pad+cw,pad+ch);ctx.stroke();
  // goal line
  ctx.strokeStyle='#F87171';ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(pad,y(goal));ctx.lineTo(pad+cw,y(goal));ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#F87171';ctx.font='10px DM Sans';ctx.fillText('Goal '+goal,pad+4,y(goal)-4);
  // rolling avg
  if(data.length>=2){
    ctx.strokeStyle='#A78BFA';ctx.lineWidth=1.5;ctx.beginPath();
    for(let i=0;i<data.length;i++){
      const a=Math.max(0,i-6);const slice=ws.slice(a,i+1);const avg=slice.reduce((p,c)=>p+c,0)/slice.length;
      if(i===0)ctx.moveTo(x(i),y(avg));else ctx.lineTo(x(i),y(avg));
    }
    ctx.stroke();
  }
  // main line
  ctx.strokeStyle='#34D399';ctx.lineWidth=2;ctx.beginPath();
  data.forEach((d,i)=>{if(i===0)ctx.moveTo(x(i),y(+d.weight));else ctx.lineTo(x(i),y(+d.weight));});
  ctx.stroke();
  // points
  ctx.fillStyle='#34D399';data.forEach((d,i)=>{ctx.beginPath();ctx.arc(x(i),y(+d.weight),3,0,Math.PI*2);ctx.fill();});
  // y labels
  ctx.fillStyle='#6B82A8';ctx.font='10px DM Sans';
  ctx.fillText(Math.round(max),4,pad+4);
  ctx.fillText(Math.round(min),4,pad+ch);
}

function gramsFromMeasure(s){
  if(!s)return 0;
  const range=s.match(/(\d+(?:\.\d+)?)\s*[–-]\s*(\d+(?:\.\d+)?)\s*g/);
  if(range)return (+range[1]+ +range[2])/2;
  const g=s.match(/(\d+(?:\.\d+)?)\s*g/);
  if(g)return +g[1];
  return 0;
}
function countFromMeasure(s){
  if(!s)return 0;
  const c=s.match(/^(\d+)\s+(lg|md|sm|large|medium|small)/i);
  if(c)return +c[1];
  return 0;
}

function smoothieMacros(b){

// Builds a deduplicated list of every distinct ingredient in MEAL_PLAN + SMOOTHIE_ING.
// Shows plan values. With API key, fetches USDA match and shows delta side-by-side.

function buildIngredientRegistry(){
  const seen={};
  // Add smoothie ingredients
  SMOOTHIE_ING.forEach(i=>{
    const key=i.n.toLowerCase().trim();
    if(!seen[key]) seen[key]={name:i.n,grams:i.m,k:i.k,p:i.p,c:i.c,f:i.f};
  });
  // Add all meal plan ingredients
  MEAL_PLAN.forEach(day=>{
    day.meals.forEach(meal=>{
      (meal.ing||[]).forEach(i=>{
        const key=i.n.toLowerCase().trim();
        if(!seen[key]) seen[key]={name:i.n,grams:i.m,k:i.k,p:i.p,c:i.c,f:i.f};
      });
    });
  });
  return Object.values(seen).sort((a,b)=>a.name.localeCompare(b.name));
}

              usdaCell=`<span style="color:var(--muted)">…</span>`;
            } else if(cached==='error'){
              usdaCell=`<span style="color:var(--red)">err</span>`;
            } else if(cached==='none'){
              usdaCell=`<span style="color:var(--muted2)">n/a</span>`;
            } else if(cached){
              // cached = {k,p,c,f,name} from USDA
              const dk=cached.k-ing.k, dp=cached.p-ing.p, dc=cached.c-ing.c, df=cached.f-ing.f;
              const anyDiff=Math.abs(dk)>10||Math.abs(dp)>3||Math.abs(dc)>3||Math.abs(df)>2;
              usdaCell=`<button class="btn sm" style="font-size:10px;padding:3px 6px;${anyDiff?'border-color:var(--yellow);color:var(--yellow)':'border-color:var(--green);color:var(--green)'}" onclick="showUsdaDetail('${key.replace(/'/g,"\\'")}')">
                ${anyDiff?'⚠ Δ':'✓ OK'}
              </button>`;
            } else {
              usdaCell=`<button class="btn sm" style="font-size:10px;padding:3px 6px" onclick="fetchUsda('${key.replace(/'/g,"\\'")}','${ing.name.replace(/'/g,"\\'")}',${ing.k},${ing.p},${ing.c},${ing.f},'${ing.grams}')">Fetch</button>`;
            }
            return `<tr style="border-bottom:1px solid var(--border);${idx%2===0?'background:var(--surface)':'background:var(--surface2)'}">
              <td style="padding:7px 6px;font-weight:600;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ing.name}</td>
              <td style="padding:7px 4px;text-align:center;color:var(--muted)">${ing.grams}</td>
              <td style="padding:7px 4px;text-align:center">${ing.k}${diffTag}</td>
              <td style="padding:7px 4px;text-align:center;color:var(--protein)">${ing.p}</td>
              <td style="padding:7px 4px;text-align:center;color:var(--carbs)">${ing.c}</td>
              <td style="padding:7px 4px;text-align:center;color:var(--fat)">${ing.f}</td>
              <td style="padding:7px 4px;text-align:center">${usdaCell}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
    <div id="verify-empty" class="empty" style="${filtered.length===0 ? '' : 'display:none'}">No ingredients match that filter.</div>
    <div class="card" style="margin-top:12px">
      <div class="row"><h3>Legend</h3></div>
      <div class="muted2" style="line-height:1.8">
        <span style="color:var(--red)">Red Δ</span> on kcal = stated kcal differs from P×4+C×4+F×9 by more than 15<br>
        <span style="color:var(--yellow)">Yellow Δ</span> = differs 6–15 kcal<br>
        <span style="color:var(--green)">✓ OK</span> = USDA match within acceptable tolerance<br>
        <span style="color:var(--yellow)">⚠ Δ</span> = USDA data differs from plan by >10 kcal or >3g macro<br>
        Tap Fetch on any row to cross-reference against USDA FoodData Central.
      </div>
    </div>
  `;
}

function clearVerifyCache(){localStorage.removeItem('mf_verify_cache');toast('Cache cleared — all Fetch buttons are live');renderVerify();}
function setVFilter(v){
  window._vFilter=v;
  // Only re-render the table rows, not the entire page — preserves input focus
  const filter=v.toLowerCase();
  const results=S('mf_verify_cache',{});
  const registry=buildIngredientRegistry();
  const filtered=filter?registry.filter(i=>i.name.toLowerCase().includes(filter)):registry;
  const apiKey=S('mf_api_key','');
  const tbody=document.querySelector('#verify-table tbody');
  if(!tbody){renderVerify();return;}
  tbody.innerHTML=filtered.map((ing,idx)=>{
    const key=ing.name.toLowerCase().trim();
    const cached=results[key];
    const computed=Math.round(ing.p*4+ing.c*4+ing.f*9);
    const diff=ing.k-computed;
    const diffTag=Math.abs(diff)>15?`<span style="color:var(--red);font-weight:700"> (${diff>0?'+':''}${diff})</span>`:
                  Math.abs(diff)>5?`<span style="color:var(--yellow)"> (${diff>0?'+':''}${diff})</span>`:'';
    let usdaCell='';
    if(cached==='loading'){usdaCell=`<span style="color:var(--muted)">…</span>`;}
    else if(cached==='error'){usdaCell=`<span style="color:var(--red)">err</span>`;}
    else if(cached==='none'){usdaCell=`<span style="color:var(--muted2)">n/a</span>`;}
    else if(cached){
      const dk=cached.k-ing.k,dp=cached.p-ing.p,dc=cached.c-ing.c,df=cached.f-ing.f;
      const anyDiff=Math.abs(dk)>10||Math.abs(dp)>3||Math.abs(dc)>3||Math.abs(df)>2;
      usdaCell=`<button class="btn sm" style="font-size:10px;padding:3px 6px;${anyDiff?'border-color:var(--yellow);color:var(--yellow)':'border-color:var(--green);color:var(--green)'}" onclick="showUsdaDetail('${key.replace(/'/g,"\\'")}')">
        ${anyDiff?'⚠ Δ':'✓ OK'}
      </button>`;
    }else{
      usdaCell=`<button class="btn sm" style="font-size:10px;padding:3px 6px" onclick="fetchUsda('${key.replace(/'/g,"\\'")}','${ing.name.replace(/'/g,"\\'")}',${ing.k},${ing.p},${ing.c},${ing.f},'${ing.grams}')">Fetch</button>`;
    }
    return `<tr style="border-bottom:1px solid var(--border);${idx%2===0?'background:var(--surface)':'background:var(--surface2)}'}">
      <td style="padding:7px 6px;font-weight:600;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ing.name}</td>
      <td style="padding:7px 4px;text-align:center;color:var(--muted)">${ing.grams}</td>
      <td style="padding:7px 4px;text-align:center">${ing.k}${diffTag}</td>
      <td style="padding:7px 4px;text-align:center;color:var(--protein)">${ing.p}</td>
      <td style="padding:7px 4px;text-align:center;color:var(--carbs)">${ing.c}</td>
      <td style="padding:7px 4px;text-align:center;color:var(--fat)">${ing.f}</td>
      <td style="padding:7px 4px;text-align:center">${usdaCell}</td>
    </tr>`;
  }).join('');
  const emptyEl=document.getElementById('verify-empty');
  if(emptyEl) emptyEl.style.display=filtered.length===0?'block':'none';
}
function clearVFilter(){window._vFilter='';const el=document.getElementById('vFilter');if(el)el.value='';setVFilter('');}

async function fetchUsda(key,name,pk,pp,pc,pf,grams){
  const apiKey=S('mf_api_key','');
  if(!apiKey){toast('No API key saved — add it in Nutrition → Food');return;}
  const cache=S('mf_verify_cache',{});
  cache[key]='loading';
  SS('mf_verify_cache',cache);
  renderVerify();
  try{
    const r=await fetch(`https://api.nal.usda.gov/fdc/v1/foods/search?api_key=${encodeURIComponent(apiKey)}&query=${encodeURIComponent(name)}&pageSize=5&dataType=Survey%20(FNDDS),SR%20Legacy,Foundation`);
    if(!r.ok){
      console.error('USDA fetchUsda error',r.status,name);
      const c=S('mf_verify_cache',{});c[key]='error';SS('mf_verify_cache',c);
      renderVerify();return;
    }
    const data=await r.json();
    const foods=data.foods||[];
    if(!foods.length){
      const c=S('mf_verify_cache',{});c[key]='none';SS('mf_verify_cache',c);
      renderVerify();return;
    }
    // Pick best match: prefer exact name match, else first result
    const best=foods.find(f=>f.description.toLowerCase().includes(name.toLowerCase().split(' ')[0]))||foods[0];
    const kcal=nutVal(best,'Energy');
    const prot=nutVal(best,'Protein');
    const carb=nutVal(best,'Carbohydrate');
    const fat =nutVal(best,'Total lipid');
    // Extract gram amount from grams string for scaling
    const gMatch=grams.match(/(\d+(?:\.\d+)?)\s*g/);
    const gNum=gMatch?+gMatch[1]:100;
    const scale=gNum/100;
    const c=S('mf_verify_cache',{});
    c[key]={
      usdaName:best.description,
      fdcId:best.fdcId,
      per100:{k:Math.round(kcal),p:+prot.toFixed(1),c:+carb.toFixed(1),f:+fat.toFixed(1)},
      scaled:{k:Math.round(kcal*scale),p:Math.round(prot*scale*10)/10,c:Math.round(carb*scale*10)/10,f:Math.round(fat*scale*10)/10},
      // plan values for comparison
      plan:{k:pk,p:pp,c:pc,f:pf,grams:grams}
    };
    SS('mf_verify_cache',c);
    renderVerify();
  }catch(e){
    const c=S('mf_verify_cache',{});c[key]='error';SS('mf_verify_cache',c);
    renderVerify();
  }
}

function showUsdaDetail(key){
  const cache=S('mf_verify_cache',{});
  const d=cache[key];
  if(!d||typeof d==='string') return;
  const plan=d.plan;
  const usda=d.scaled;
  function row(label,pv,uv,unit=''){
    const diff=Math.round((uv-pv)*10)/10;
    const col=Math.abs(diff)>10?'var(--red)':Math.abs(diff)>3?'var(--yellow)':'var(--green)';
    return `<div class="ing-row">
      <div>${label}</div>
      <div style="color:var(--muted)">${pv}${unit} plan</div>
      <div class="mac">${uv}${unit} USDA <span style="color:${col}">${diff>0?'+':''}${diff}</span></div>
    </div>`;
  }
  openModal(`
    <h3 style="font-size:14px;margin-bottom:4px">${d.usdaName}</h3>
    <div class="muted2" style="margin-bottom:10px">FDC ID: ${d.fdcId} · Serving: ${plan.grams}</div>
    <div style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:6px;font-weight:600">Plan vs USDA (at serving size)</div>
    ${row('kcal',plan.k,usda.k)}
    ${row('Protein',plan.p,usda.p,'g')}
    ${row('Carbs',plan.c,usda.c,'g')}
    ${row('Fat',plan.f,usda.f,'g')}
    <div class="muted2" style="margin-top:10px;font-size:11px">Positive = USDA higher than plan · Negative = plan higher than USDA</div>
    <div class="row" style="margin-top:12px;gap:8px">
      <button class="btn full" onclick="closeModal()">Close</button>
      <button class="btn primary full" onclick="applyUsdaValues('${key}')">Apply USDA Values</button>
    </div>
  `);
}

function applyUsdaValues(key){
  // This cannot automatically update MEAL_PLAN constants (they're runtime JS, not editable).
  // Instead, show the user what values to update manually, or use override storage.
  const cache=S('mf_verify_cache',{});
  const d=cache[key];
  if(!d||typeof d==='string') return;
  const u=d.scaled;
  const overrides=S('mf_verify_overrides',{});
  overrides[key]={k:u.k,p:u.p,c:u.c,f:u.f,source:'USDA FDC '+d.fdcId};
  SS('mf_verify_overrides',overrides);
  closeModal();
  toast('USDA values saved as override note');
  // Show confirmation with what changed
  const plan=d.plan;
  openModal(`<h3>Override Saved</h3>
    <div class="muted2" style="margin-bottom:10px">USDA values recorded. The meal plan display shows plan values — overrides are reference notes only and do not change your food log calculations.</div>
    <div class="ing-row"><div>kcal</div><div>${plan.k}→${u.k}</div><div class="mac" style="color:var(--green)">saved</div></div>
    <div class="ing-row"><div>Protein</div><div>${plan.p}→${u.p}g</div><div class="mac" style="color:var(--green)">saved</div></div>
    <div class="ing-row"><div>Carbs</div><div>${plan.c}→${u.c}g</div><div class="mac" style="color:var(--green)">saved</div></div>
    <div class="ing-row"><div>Fat</div><div>${plan.f}→${u.f}g</div><div class="mac" style="color:var(--green)">saved</div></div>
    <div class="muted2" style="margin-top:10px">To update the plan permanently, note these values and share them — the HTML data constants will be corrected.</div>
    <button class="btn primary full" style="margin-top:10px" onclick="closeModal();renderVerify()">Done</button>
  `);
}

</script>
