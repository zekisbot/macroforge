<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#080B12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>DELT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  /* ── DELT Design System ── */
  --bg:#080B12;--surface:#0E1117;--surface2:#13181F;--surface3:#181E27;
  --border:#1C2330;--border2:#242E3D;--text:#F0F2F5;--muted:#5C6880;
  --muted2:#3A4356;
  /* Accent: electric violet-indigo */
  --accent:#7C5CFC;--accent2:#5B3FD4;--accent-glow:rgba(124,92,252,.25);
  /* Macro palette — vivid, saturated */
  --green:#22D97A;--green2:#16A558;
  --protein:#3FB8F5;--carbs:#FF8C42;--fat:#F564B0;
  --water:#4DAAFF;--yellow:#FFD166;--purple:#A78BFA;--red:#FF5C5C;
  /* Gradients */
  --grad-accent:linear-gradient(135deg,#7C5CFC,#5B3FD4);
  --grad-green:linear-gradient(135deg,#22D97A,#16A558);
  --grad-card:linear-gradient(180deg,#13181F 0%,#0E1117 100%);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;height:100%;overscroll-behavior:none}
body::before{content:'';position:fixed;inset:0;background:url("data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%20200%2080%27%3E%3Cg%20fill%3D%27%2523E8EDF5%27%3E%3Crect%20x%3D%270%27%20y%3D%2728%27%20width%3D%2728%27%20height%3D%2724%27%20rx%3D%275%27/%3E%3Crect%20x%3D%2720%27%20y%3D%2720%27%20width%3D%2716%27%20height%3D%2740%27%20rx%3D%274%27/%3E%3Crect%20x%3D%2784%27%20y%3D%2732%27%20width%3D%2732%27%20height%3D%2716%27%20rx%3D%273%27/%3E%3Crect%20x%3D%27164%27%20y%3D%2720%27%20width%3D%2716%27%20height%3D%2740%27%20rx%3D%274%27/%3E%3Crect%20x%3D%27172%27%20y%3D%2728%27%20width%3D%2728%27%20height%3D%2724%27%20rx%3D%275%27/%3E%3C/g%3E%3C/svg%3E") center center / 55% auto no-repeat;opacity:0.07;z-index:0;pointer-events:none}
main,.modal-bg{position:relative;z-index:1}
body{max-width:430px;margin:0 auto;padding:0;position:relative;height:var(--app-height,100dvh);overflow:hidden;display:flex;flex-direction:column}
.num,h1,h2,h3,h4,.bignum,.tab,.pill{font-family:'Space Grotesk',sans-serif;letter-spacing:-0.01em}
button{font-family:inherit;border:0;background:transparent;color:inherit;cursor:pointer;font-size:14px}
input,select,textarea{font-family:inherit;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:14px;padding:12px 14px;font-size:15px;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
#app-shell{display:flex;flex-direction:column;flex:1;overflow:hidden;position:relative;z-index:1}
.app-header{padding:14px 16px 6px;flex-shrink:0;background:rgba(8,11,18,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:static}
.app-title{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:800;letter-spacing:0.1em;color:var(--green);display:flex;align-items:center;gap:8px}
.app-title .dot{width:28px;height:28px;background:var(--grad-accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff;letter-spacing:0;box-shadow:0 0 16px var(--accent-glow),0 2px 8px rgba(0,0,0,.4);flex-shrink:0}
#subnav-wrap{flex-shrink:0;background:var(--bg);padding:0 16px 10px;overflow-x:auto;scrollbar-width:none;display:none;-webkit-mask-image:linear-gradient(to right,black 85%,transparent 100%);mask-image:linear-gradient(to right,black 85%,transparent 100%)}
#subnav-wrap::-webkit-scrollbar{display:none}
#scroll-body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(80px + env(safe-area-inset-bottom))}
.page{display:none;padding:8px 16px 24px;animation:fadein .15s ease}
.page.active{display:block}
@keyframes fadein{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.subnav{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;background:transparent;padding:0}
.subnav::-webkit-scrollbar{display:none}
.pill{flex:0 0 auto;flex-shrink:0;padding:7px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:999px;color:var(--muted);font-size:12px;font-weight:700;text-transform:uppercase;white-space:nowrap;letter-spacing:0.04em}
.pill.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 0 12px var(--accent-glow)}
.bottomnav{position:static;flex-shrink:0;background:rgba(14,17,23,.95);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--border);display:grid;grid-template-columns:repeat(5,1fr);padding:8px 4px calc(8px + env(safe-area-inset-bottom));z-index:100}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 4px;border-radius:12px;color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;transition:color .15s}
.nav-btn .ico{font-size:22px}
.nav-btn.active{color:var(--accent)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:16px;margin-bottom:12px;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.card.tappable{cursor:pointer;transition:transform .1s,border-color .15s}
.card.tappable:active{transform:scale(.98)}
.card.tappable:hover{border-color:var(--border2)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row{display:flex;align-items:center;gap:10px}
.spacer{flex:1}
.muted{color:var(--muted);font-size:13px}
.muted2{color:var(--muted2);font-size:12px}
.label{font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);font-weight:600}
.bignum{font-family:'Space Grotesk',sans-serif;font-size:42px;font-weight:700;line-height:1;color:var(--text)}
.midnum{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;line-height:1}
.smallnum{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:600;line-height:1}
h2{font-size:20px;font-weight:700;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.06em}
h3{font-size:16px;font-weight:700;margin-bottom:8px}
h4{font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted)}
.btn{padding:10px 16px;border-radius:12px;font-weight:700;font-size:14px;background:var(--surface2);border:1px solid var(--border);color:var(--text);transition:all .15s;letter-spacing:0.01em}
.btn:active{transform:scale(.97)}
.btn.primary{background:var(--grad-accent);color:#fff;border-color:transparent;box-shadow:0 2px 12px var(--accent-glow)}
.btn.danger{background:transparent;color:var(--red);border-color:var(--red)}
.btn.purple{background:var(--purple);color:#1A0F2E;border-color:var(--purple)}
.btn.water{background:var(--water);color:#0A1E3A;border-color:var(--water)}
.btn.full{width:100%}
.btn.sm{padding:6px 10px;font-size:12px}
.bar{height:6px;background:var(--surface3);border-radius:999px;overflow:hidden;position:relative}
.bar > div{height:100%;border-radius:4px;transition:width .3s ease}
.bar.thick{height:10px}
.streak-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.streak{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center}
.streak .v{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;line-height:1}
.streak .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-top:4px}
.ring{position:relative;width:160px;height:160px;margin:0 auto}
.ring svg{transform:rotate(-90deg)}
.ring .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.macro-row{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.macro-row:last-child{border:0}
.tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em}
.tag.lift{background:rgba(56,189,248,.15);color:var(--protein);border:1px solid var(--protein)}
.tag.cardio{background:rgba(251,146,60,.15);color:var(--carbs);border:1px solid var(--carbs)}
.tag.rest{background:rgba(167,139,250,.15);color:var(--purple);border:1px solid var(--purple)}
.tag.ok{background:rgba(52,211,153,.15);color:var(--green);border:1px solid var(--green)}
.tag.warn{background:rgba(251,191,36,.15);color:var(--yellow);border:1px solid var(--yellow)}
.tag.bad{background:rgba(248,113,113,.15);color:var(--red);border:1px solid var(--red)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:24px;padding:20px;width:100%;max-width:400px;max-height:85vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.6)}
.modal h3{margin-bottom:14px;font-size:18px;text-transform:uppercase;letter-spacing:0.05em}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:var(--muted);margin-bottom:4px;font-weight:600}
.set-circles{display:flex;gap:8px;margin:6px 0}
.set-circle{width:36px;height:36px;border-radius:50%;border:2px solid var(--border2);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk';font-weight:700;font-size:14px;color:var(--muted)}
.set-circle.done{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 0 8px var(--accent-glow)}
.list-item{display:flex;align-items:center;gap:10px;padding:10px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;margin-bottom:6px}
.list-item .del{color:var(--red);font-size:14px;padding:4px 8px}
.check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border2);background:var(--surface2);display:flex;align-items:center;justify-content:center;flex:0 0 auto;cursor:pointer;font-size:12px;font-weight:700}
.check.on{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 0 8px var(--accent-glow)}
.expand-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;margin-bottom:10px;overflow:hidden}
.expand-head{display:flex;align-items:center;gap:10px;padding:12px;cursor:pointer}
.expand-body{display:none;padding:0 12px 12px;border-top:1px solid var(--border)}
.expand-body.show{display:block;padding-top:12px}
.chev{transition:transform .2s;color:var(--muted);font-size:14px}
.chev.open{transform:rotate(180deg)}
.timer-bar{position:fixed;bottom:80px;left:0;right:0;max-width:430px;margin:0 auto;background:rgba(14,17,23,.97);backdrop-filter:blur(20px);border:1px solid var(--accent);border-radius:18px 18px 0 0;padding:10px 14px;display:none;align-items:center;gap:10px;z-index:90;box-shadow:0 -4px 24px var(--accent-glow)}
.timer-bar.show{display:flex}
.timer-bar .t{font-family:'Space Grotesk';font-weight:700;font-size:28px;color:var(--accent)}
.alert-card{background:rgba(251,191,36,.1);border:1px solid var(--yellow);border-radius:12px;padding:12px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.day-tabs{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:12px}
.day-tab{padding:8px 4px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-size:11px;font-weight:700;text-align:center;cursor:pointer;text-transform:uppercase}
.day-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 0 10px var(--accent-glow)}
.day-tab.today{border-color:var(--yellow)}
.kbd{display:inline-block;padding:1px 6px;background:var(--surface3);border:1px solid var(--border);border-radius:4px;font-size:11px;font-family:monospace}
.toast{position:fixed;top:20px;left:50%;transform:translate(-50%,-20px);background:var(--surface3);border:1px solid var(--accent);color:var(--text);padding:10px 18px;border-radius:14px;font-weight:600;font-size:14px;z-index:300;opacity:0;transition:all .3s;pointer-events:none;max-width:90%;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.5),0 0 20px var(--accent-glow)}
.toast.show{transform:translate(-50%,0);opacity:1}
.ing-row{display:grid;grid-template-columns:80px 1fr auto;gap:8px;padding:6px 0;font-size:13px;border-bottom:1px dashed var(--border)}
.ing-row:last-child{border:0}
.ing-row .m{color:var(--muted);font-weight:600;font-size:12px}
.ing-row .mac{color:var(--muted);font-size:11px;text-align:right}
canvas{width:100%;height:200px;display:block}
iframe{width:100%;aspect-ratio:16/9;border:0;border-radius:10px;background:#000}
.video-row{display:flex;flex-direction:column;margin-top:0.6rem}
.cue{padding:6px 0;font-size:13px;color:var(--text);display:flex;gap:8px}
.cue::before{content:"›";color:var(--green);font-weight:700}
.threshold-list{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:12px;font-size:11px}
.thr{padding:6px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;display:flex;justify-content:space-between;align-items:center}
.thr.hit{background:rgba(167,139,250,.15);border-color:var(--purple);color:var(--purple)}
.thr .h{font-family:'Space Grotesk';font-weight:700;font-size:14px}
.section-divider{margin:18px 0 10px;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);font-weight:700;display:flex;align-items:center;gap:8px}
.section-divider::after{content:"";flex:1;height:1px;background:var(--border)}
.empty{text-align:center;padding:30px 16px;color:var(--muted);font-size:14px}
.fab{position:fixed;bottom:96px;right:calc(50vw - 215px + 16px);width:52px;height:52px;border-radius:50%;background:var(--green);color:#06251A;font-size:24px;font-weight:700;display:flex;align-items:center;justify-content:center;z-index:80;border:0;box-shadow:0 4px 12px rgba(0,0,0,.4);cursor:pointer}
@media(max-width:430px){.fab{right:16px}}
/* ── NEW v2 STYLES ── */
.rir-row{display:flex;gap:6px;margin:6px 0}
.rir-dot{width:28px;height:28px;border-radius:50%;border:2px solid var(--border2);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk';font-weight:700;font-size:12px;color:var(--muted);cursor:pointer;transition:all .15s}
.rir-dot.sel{background:var(--yellow);border-color:var(--yellow);color:#1A1200}
.milestone-row{display:grid;grid-template-columns:56px 1fr;gap:0;margin-bottom:0}
.milestone-node{display:flex;flex-direction:column;align-items:center}
.m-circle{width:42px;height:42px;border-radius:50%;border:3px solid var(--border2);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk';font-size:13px;font-weight:700;color:var(--muted);flex-shrink:0;transition:all .3s}
.m-circle.reached{background:var(--green);border-color:var(--green);color:#06251A}
.m-circle.current{background:var(--yellow);border-color:var(--yellow);color:#1A1200;box-shadow:0 0 10px rgba(251,191,36,.4)}
.m-line{width:3px;flex:1;min-height:16px;background:var(--border);margin:2px 0}
.m-line.filled{background:var(--green)}
.m-content{padding:6px 0 18px 10px}
.m-lbs{font-family:'Space Grotesk';font-size:22px;font-weight:700;line-height:1}
.m-title{font-size:13px;font-weight:700;margin:2px 0}
.m-desc{font-size:11px;color:var(--muted2);line-height:1.5}
.pillar-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.pillar-row:last-child{border:0}
.pillar-icon{font-size:22px;flex-shrink:0;margin-top:1px}
.pillar-body{flex:1}
.pillar-name{font-weight:700;font-size:14px}
.pillar-note{font-size:12px;color:var(--muted2);margin-top:2px;line-height:1.5}
.eat-window-card{background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.35);border-radius:12px;padding:12px;margin-bottom:12px}
.lapse-card{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.3);border-radius:12px;padding:14px;margin-bottom:12px}
.smoothie-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.smoothie-row:last-child{border:0}
.smoothie-qty{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;width:62px;padding:5px 8px;font-size:13px;text-align:center}
.photo-entry{display:flex;align-items:center;gap:10px;padding:10px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;margin-bottom:6px}
.rate-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:700;font-family:'Space Grotesk'}
.rate-pill.good{background:rgba(52,211,153,.15);color:var(--green);border:1px solid var(--green)}
.rate-pill.fast{background:rgba(248,113,113,.15);color:var(--red);border:1px solid var(--red)}
.rate-pill.slow{background:rgba(251,191,36,.15);color:var(--yellow);border:1px solid var(--yellow)}
.carb-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.carb-badge.rice{background:rgba(56,189,248,.15);color:var(--protein);border:1px solid var(--protein)}
.carb-badge.potato{background:rgba(251,146,60,.15);color:var(--carbs);border:1px solid var(--carbs)}
.wednesday-card{background:rgba(167,139,250,.08);border:1px solid rgba(167,139,250,.35);border-radius:12px;padding:12px;margin-bottom:12px}
/* ── ONBOARDING WIZARD ── */
.ob-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:400;display:none;align-items:flex-end;justify-content:center}
.ob-bg.open{display:flex}
.ob-sheet{background:rgba(14,17,23,.98);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border:1px solid var(--border2);border-radius:28px 28px 0 0;padding:24px 20px calc(24px + env(safe-area-inset-bottom));width:100%;max-width:430px;max-height:90vh;overflow-y:auto}
.ob-dots{display:flex;justify-content:center;gap:6px;margin-bottom:20px}
.ob-dot{width:8px;height:8px;border-radius:50%;background:var(--border2);transition:all .2s}
.ob-dot.active{background:var(--accent);width:20px;border-radius:4px}
.ob-dot.done{background:var(--accent)}
.ob-title{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px}
.ob-sub{font-size:14px;color:var(--muted);margin-bottom:20px;line-height:1.5}
.ob-opts{display:grid;gap:8px;margin-bottom:20px}
.ob-opt{padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;text-align:left;font-size:15px;font-weight:500;color:var(--text);transition:all .15s;cursor:pointer}
.ob-opt:active{transform:scale(.98)}
.ob-opt.sel{border-color:var(--accent);background:rgba(124,92,252,.12);color:var(--accent)}
.ob-opt .ob-opt-sub{font-size:12px;color:var(--muted);margin-top:2px}
.ob-opt.sel .ob-opt-sub{color:var(--accent);opacity:.8}
.ob-nav{display:flex;gap:10px;margin-top:4px}
.ob-preview{background:rgba(124,92,252,.08);border:1px solid rgba(124,92,252,.25);border-radius:16px;padding:14px;margin-bottom:20px}
.ob-preview-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:14px}
.ob-preview-row:last-child{border:0}
.ob-preview-row .val{font-family:'Space Grotesk';font-size:20px;font-weight:700;color:var(--accent)}

/* ── DELT Header ── */
.app-header-inner{display:flex;align-items:center;justify-content:space-between;gap:8px}
.app-tagline{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--muted2);white-space:nowrap}
/* ── Home screen enhancements ── */
.home-greeting{margin-bottom:16px}
.home-greeting .time-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:2px}
.home-greeting .name-line{font-family:'Space Grotesk',sans-serif;font-size:30px;font-weight:800;letter-spacing:-0.02em;line-height:1.1;background:linear-gradient(135deg,var(--text) 40%,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.home-greeting .date-line{font-size:13px;color:var(--muted);margin-top:4px}
/* ── Stat cards ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:14px;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.stat-card.accent-card{background:linear-gradient(135deg,rgba(124,92,252,.15),rgba(91,63,212,.08));border-color:rgba(124,92,252,.3)}
.stat-card .s-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:6px}
.stat-card .s-val{font-family:'Space Grotesk',sans-serif;font-size:32px;font-weight:800;line-height:1;letter-spacing:-0.02em}
.stat-card .s-sub{font-size:11px;color:var(--muted);margin-top:4px}
/* ── Progress ring glow ── */
.ring-glow{filter:drop-shadow(0 0 8px var(--accent-glow))}
/* ── Accent divider ── */
.section-divider{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);padding:8px 0 6px;display:flex;align-items:center;gap:8px}
.section-divider::after{content:'';flex:1;height:1px;background:var(--border)}
/* ── List items rounder ── */
.list-item{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:14px;margin-bottom:6px}
/* ── Eat window card ── */
.eat-window-card{background:rgba(34,217,122,.07);border:1px solid rgba(34,217,122,.2);border-radius:14px;padding:12px;margin-bottom:10px}
/* ── Wednesday card ── */
.wednesday-card{background:rgba(124,92,252,.08);border:1px solid rgba(124,92,252,.3);border-radius:14px;padding:12px;margin-bottom:12px}
/* ── Alert card ── */
.alert-card{background:rgba(255,209,102,.07);border:1px solid rgba(255,209,102,.25);border-radius:14px;padding:12px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
/* ── Carb badge ── */
.carb-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:999px;font-size:12px;font-weight:700;letter-spacing:0.02em}
.carb-badge.rice{background:rgba(63,184,245,.12);color:var(--protein);border:1px solid rgba(63,184,245,.3)}
.carb-badge.potato{background:rgba(255,140,66,.12);color:var(--carbs);border:1px solid rgba(255,140,66,.3)}
/* ── Streak cells ── */
.streak{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:10px 8px;text-align:center}
.streak .v{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:800;line-height:1}
.streak .l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-top:4px}
/* ── Background watermark — DELT themed ── */
body::before{content:'';position:fixed;inset:0;

function dateKey(d){d=d||new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function isoWeekKey(d){d=new Date(d||new Date());const t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));const dn=t.getUTCDay()||7;t.setUTCDate(t.getUTCDate()+4-dn);const ys=new Date(Date.UTC(t.getUTCFullYear(),0,1));const wk=Math.ceil(((t-ys)/86400000+1)/7);return t.getUTCFullYear()+'-W'+String(wk).padStart(2,'0');}
function S(k,fb){try{const v=localStorage.getItem(k);return v===null?fb:JSON.parse(v);}catch(e){return fb;}}
function SS(k,v){localStorage.setItem(k,JSON.stringify(v));}
function fkey(d){return 'mf_food_'+dateKey(d);}
function wkey(d){return 'mf_water_'+dateKey(d);}
function skey(d){return 'mf_sets_'+dateKey(d);}
function bkey(d){return 'mf_burned_'+dateKey(d);}
function spkey(d){return 'mf_supps_'+dateKey(d);}
function mckey(d){return 'mf_mealcheck_'+dateKey(d);}
function pkey(d){return 'mf_prep_'+isoWeekKey(d);}

// ============= PROFILE SCHEMA =============
// mf_profile: {sex,age,heightIn,weightLbs,goalWeightLbs,activityLevel,goal,fastingProtocol,onboardingComplete}
const PROFILE_DEFAULTS = {name:'',sex:'m',age:30,heightIn:69,weightLbs:180,goalWeightLbs:160,activityLevel:1.375,goal:'recomp',fastingProtocol:'18:6',diet:'balanced',equipment:'gym',tier:'beginner',onboardingComplete:false};
function getProfile(){return Object.assign({},PROFILE_DEFAULTS,S('mf_profile',{}));}
function saveProfile(p){SS('mf_profile',p);}

// ============= TDEE ENGINE (Mifflin-St Jeor) =============
function calcTDEE(profile){
  const p=profile;
  const htCm=p.heightIn*2.54;
  const wtKg=p.weightLbs*0.453592;
  // BMR
  let bmr;
  if(p.sex==='m') bmr=10*wtKg+6.25*htCm-5*p.age+5;
  else             bmr=10*wtKg+6.25*htCm-5*p.age-161;
  const tdee=Math.round(bmr*p.activityLevel);
  // Apply goal offset
  let kcalTarget;
  if(p.goal==='cut')    kcalTarget=Math.round(tdee*0.80); // ~20% deficit
  else if(p.goal==='bulk') kcalTarget=Math.round(tdee*1.10); // ~10% surplus
  else                  kcalTarget=Math.round(tdee*0.90); // recomp: slight deficit
  // Macro split — protein-first
  const proteinG=Math.round(p.weightLbs*0.82); // ~0.82g per lb bodyweight
  const proteinKcal=proteinG*4;
  const remaining=kcalTarget-proteinKcal;
  const fatKcal=Math.round(kcalTarget*0.28);
  const carbKcal=remaining-fatKcal;
  const fatG=Math.round(fatKcal/9);
  const carbG=Math.max(0,Math.round(carbKcal/4));
  // Compliance window: ±10% of target
  const compMin=Math.round(kcalTarget*0.88);
  const compMax=Math.round(kcalTarget*1.05);
  return {tdee,kcalTarget,proteinG,carbG,fatG,compMin,compMax};
}

function applyProfileToSettings(profile){
  const calc=calcTDEE(profile);
  const s=getSettings();
  s.calGoal=calc.kcalTarget;
  // Store as grams (not %) for direct use
  s.proteinG=calc.proteinG;
  s.carbG=calc.carbG;
  s.fatG=calc.fatG;
  // Keep % fields for legacy Goals screen compatibility
  s.protein=Math.round(calc.proteinG*4/calc.kcalTarget*100);
  s.carbs=Math.round(calc.carbG*4/calc.kcalTarget*100);
  s.fat=Math.round(calc.fatG*9/calc.kcalTarget*100);
  s.weight=profile.weightLbs;
  s.complianceMin=calc.compMin;
  s.complianceMax=calc.compMax;
  saveSettings(s);
  return calc;
}

// Helper: filter meal pool by profile
function filterMeals(goal, diet, tier) {
  return MEAL_POOL.filter(m =>
    m.tags.goal.includes(goal) &&
    m.tags.diet.includes(diet) &&
    m.tags.tier.includes(tier)
  );
}

// ============= PLAN GENERATOR: MEALS =============
// Option B: generate once on profile completion, cache to mf_mealplan
function generateMealPlan(profile) {
  const goal = profile.goal || 'recomp';
  const diet = profile.diet || 'balanced';
  const tier = profile.tier || 'beginner';
  const targetKcal = getSettings().calGoal || 1800;

  // Filter pool by profile
  let pool = filterMeals(goal, diet, tier);
  // Fallback: if diet is restrictive and pool is thin, add 'balanced'
  if (pool.length < 10) pool = filterMeals(goal, 'balanced', tier);

  // Separate by meal time
  const byTime = (t) => pool.filter(m => m.tags.diet.includes(diet) && m.time === t);
  let breakfasts = byTime('Breakfast');
  let lunches = byTime('Lunch');
  let dinners = byTime('Dinner');
  let snacks = byTime('Snack');

  // Fallback to full pool by time if filtered list is too small
  const byTimeFull = (t) => MEAL_POOL.filter(m => m.time === t && m.tags.goal.includes(goal));
  if (breakfasts.length < 3) breakfasts = byTimeFull('Breakfast');
  if (lunches.length < 3) lunches = byTimeFull('Lunch');
  if (dinners.length < 3) dinners = byTimeFull('Dinner');
  if (snacks.length < 2) snacks = byTimeFull('Snack');

  // Shuffle helper (seeded by profile so same profile = same plan until regenerated)
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const dayLabels = {
    Mon:'Monday',Tue:'Tuesday',Wed:'Wednesday',Thu:'Thursday',
    Fri:'Friday',Sat:'Saturday',Sun:'Sunday'
  };

  const sb = shuffle(breakfasts);
  const sl = shuffle(lunches);
  const sd = shuffle(dinners);
  const ss = shuffle(snacks);

  // Determine meal count per day based on calorie target
  // Low cal (cut <1600): 3 meals no snack
  // Medium (1600-2200): 3 meals + 1 snack
  // High (>2200 bulk): 3 meals + 2 snacks
  const mealCount = targetKcal < 1600 ? 3 : targetKcal > 2200 ? 5 : 4;

  const plan = days.map((day, i) => {
    const b = sb[i % sb.length];
    const l = sl[i % sl.length];
    const d = sd[i % sd.length];
    const s1 = ss[i % ss.length];
    const s2 = ss[(i + 1) % ss.length];

    const meals = [b, l, d];
    if (mealCount >= 4 && s1) meals.splice(2, 0, s1); // snack before dinner
    if (mealCount >= 5 && s2 && s2.id !== s1?.id) meals.push(s2);

    return {
      day,
      label: dayLabels[day],
      type: 'balanced',
      meals: meals.filter(Boolean).map(m => ({
        id: m.id + '-' + day,
        name: m.name,
        emoji: m.emoji,
        time: m.time,
        kcal: m.kcal,
        protein: m.protein,
        carbs: m.carbs,
        fat: m.fat,
        fiber: m.fiber,
        prep: m.prep,
        ing: m.ingredients.map(i => ({
          m: `${i.qty} ${i.unit}`,
          n: i.item,
          k: Math.round(m.kcal / m.ingredients.length),
          p: Math.round(m.protein / m.ingredients.length),
          c: Math.round(m.carbs / m.ingredients.length),
          f: Math.round(m.fat / m.ingredients.length)
        })),
        tip: m.prep
      }))
    };
  });

  saveMealPlan(plan);
  return plan;
}

function macros(items,inclSwap){
  let k=0,p=0,c=0,f=0;
  items.forEach(i=>{
    if(i.swap&&!inclSwap)return;
    k+=+(i.kcal||i.k||0);
    p+=+(i.protein||i.p||0);
    c+=+(i.carbs||i.c||0);
    f+=+(i.fat||i.f||0);
  });
  return{kcal:Math.round(k),protein:Math.round(p),carbs:Math.round(c),fat:Math.round(f)};
}
// Returns macros for only the swap ingredients (tuna option)
function macrosSwap(items){
  // Base ingredients (no swap flag) contribute fixed items like sweet potato + avocado
  // Swap items replace the chicken
  let k=0,p=0,c=0,f=0;
  items.forEach(i=>{
    if(!i.swap&&i.n&&i.n.toLowerCase().includes('chicken'))return; // skip chicken when tuna active
    k+=+(i.kcal||i.k||0);
    p+=+(i.protein||i.p||0);
    c+=+(i.carbs||i.c||0);
    f+=+(i.fat||i.f||0);
  });
  return{kcal:Math.round(k),protein:Math.round(p),carbs:Math.round(c),fat:Math.round(f)};
}

function obOpen(fromSettings){
  const p=getProfile();
  _ob={step:0,data:{
    name:p.name||'',sex:p.sex,age:p.age,heightIn:p.heightIn,weightLbs:p.weightLbs,
    goalWeightLbs:p.goalWeightLbs,activityLevel:p.activityLevel,
    goal:p.goal,fastingProtocol:p.fastingProtocol,
    diet:p.diet||'balanced',equipment:p.equipment||'gym',tier:p.tier||'beginner'
  }};
  document.getElementById('ob-modal').classList.add('open');
  obRender();
}
function obClose(){document.getElementById('ob-modal').classList.remove('open');}

function obDots(){
  return Array.from({length:OB_STEPS},(_,i)=>
    `<div class="ob-dot ${i<_ob.step?'done':i===_ob.step?'active':''}"></div>`
  ).join('');
}

function obBack(){if(_ob.step>0){_ob.step--;obRender();}}
function obSkip(){
  const profile=getProfile();
  if(!profile.onboardingComplete){
    // Mark skipped so we do not re-prompt every launch
    profile.onboardingComplete='skipped';
    saveProfile(profile);
  }
  obClose();
}

function obCollectAgeHeight(){
  const age=parseInt(document.getElementById('ob-age').value)||0;
  const ft=parseInt(document.getElementById('ob-ht-ft').value)||0;
  const inch=parseInt(document.getElementById('ob-ht-in').value)||0;
  const heightIn=ft*12+inch;
  if(age<14||age>99){toast('Enter a valid age (14–99)');return;}
  if(heightIn<48||heightIn>96){toast('Enter a valid height');return;}
  _ob.data.age=age;
  _ob.data.heightIn=heightIn;
  _ob.step=4;obRender();
}

function obCollectWeight(){
  const wt=parseFloat(document.getElementById('ob-wt').value)||0;
  const gwt=parseFloat(document.getElementById('ob-gwt').value)||0;
  if(wt<80||wt>500){toast('Enter a valid weight (80–500 lbs)');return;}
  if(gwt<80||gwt>500){toast('Enter a valid goal weight (80–500 lbs)');return;}
  _ob.data.weightLbs=wt;
  _ob.data.goalWeightLbs=gwt;
  _ob.step=5;obRender();
}

function obFinish(){
  const profile={..._ob.data,name:(_ob.data.name||'').trim(),onboardingComplete:true};
  saveProfile(profile);
  const ftMap={'16:6':16,'18:6':18,'20:4':20,'omad':23,'none':0};
  SS('mf_fast_target',ftMap[profile.fastingProtocol]||0);
  applyProfileToSettings(profile);
  const wlog=S('mf_weightlog',[]);
  if(!wlog.length){wlog.push({date:dateKey(),weight:profile.weightLbs});SS('mf_weightlog',wlog);}
  // Generate personalized plans — Option B: generate once, cache forever
  generateMealPlan(profile);
  generateWorkoutPlan(profile);
  obClose();
  toast('Profile set — your plan is ready ✓');
  renderHome();
}

// ============= PLAN GENERATOR: WORKOUT =============
// Option B: generate once on profile completion, cache to mf_program
function generateWorkoutPlan(profile) {
  const goal = profile.goal || 'recomp';
  const equipment = profile.equipment || 'gym';
  const tier = profile.tier || 'beginner';

  // Determine weekly split based on tier
  // Beginner: 3-day full body
  // Intermediate: 4-day upper/lower
  // Advanced/Expert: 5-day PPL + upper/lower hybrid
  const splitType = tier === 'beginner' ? 'fullbody'
                  : tier === 'intermediate' ? 'upperlower'
                  : 'ppl';

  const eq = equipment;
  const P = WORKOUT_POOL.push[eq] || WORKOUT_POOL.push.gym;
  const PU = WORKOUT_POOL.pull[eq] || WORKOUT_POOL.pull.gym;
  const L = WORKOUT_POOL.legs[eq] || WORKOUT_POOL.legs.gym;
  const C = WORKOUT_POOL.core[eq] || WORKOUT_POOL.core.gym;

  // Filter by tier
  const byTier = (pool) => pool.filter(e => e.tier.includes(tier));
  const pick = (pool, n) => {
    const filtered = byTier(pool);
    return filtered.slice(0, Math.min(n, filtered.length));
  };

  // Build daily programs based on split
  let days = [];

  if (splitType === 'fullbody') {
    // 3 days on, alternating A/B/A — Beginner
    const fbA = [...pick(P, 2), ...pick(PU, 2), ...pick(L, 2), ...pick(C, 1)];
    const fbB = [...pick(PU, 2), ...pick(P, 2), ...pick(L, 2), ...pick(C, 1)];
    days = [
      {day:'Mon',label:'Monday',type:'lift',focus:'Full Body A',exercises:fbA},
      {day:'Tue',label:'Tuesday',type:'rest',focus:'Rest & Recovery',exercises:[]},
      {day:'Wed',label:'Wednesday',type:'lift',focus:'Full Body B',exercises:fbB},
      {day:'Thu',label:'Thursday',type:'rest',focus:'Rest & Recovery',exercises:[]},
      {day:'Fri',label:'Friday',type:'lift',focus:'Full Body A',exercises:fbA},
      {day:'Sat',label:'Saturday',type:'cardio',focus:'Light Cardio / Walk',exercises:[]},
      {day:'Sun',label:'Sunday',type:'rest',focus:'Rest & Recovery',exercises:[]}
    ];
  } else if (splitType === 'upperlower') {
    // 4-day upper/lower — Intermediate
    const upper = [...pick(P, 3), ...pick(PU, 3)];
    const lower = [...pick(L, 4), ...pick(C, 2)];
    days = [
      {day:'Mon',label:'Monday',type:'lift',focus:'Upper Body',exercises:upper},
      {day:'Tue',label:'Tuesday',type:'lift',focus:'Lower Body',exercises:lower},
      {day:'Wed',label:'Wednesday',type:'rest',focus:'Rest & Recovery',exercises:[]},
      {day:'Thu',label:'Thursday',type:'lift',focus:'Upper Body',exercises:upper},
      {day:'Fri',label:'Friday',type:'lift',focus:'Lower Body',exercises:lower},
      {day:'Sat',label:'Saturday',type:'cardio',focus:'Cardio / Active Recovery',exercises:[]},
      {day:'Sun',label:'Sunday',type:'rest',focus:'Rest & Recovery',exercises:[]}
    ];
  } else {
    // 5-day PPL — Advanced/Expert
    const push = pick(P, 5);
    const pull = pick(PU, 5);
    const legs = [...pick(L, 4), ...pick(C, 2)];
    days = [
      {day:'Mon',label:'Monday',type:'lift',focus:'Push',exercises:push},
      {day:'Tue',label:'Tuesday',type:'lift',focus:'Pull',exercises:pull},
      {day:'Wed',label:'Wednesday',type:'lift',focus:'Legs',exercises:legs},
      {day:'Thu',label:'Thursday',type:'rest',focus:'Rest & Recovery',exercises:[]},
      {day:'Fri',label:'Friday',type:'lift',focus:'Push',exercises:push},
      {day:'Sat',label:'Saturday',type:'lift',focus:'Pull + Legs',exercises:[...pick(PU,3),...pick(L,3)]},
      {day:'Sun',label:'Sunday',type:'rest',focus:'Rest & Recovery',exercises:[]}
    ];
  }

  // Format exercises into the existing workout render schema
  const program = days.map(d => ({
    day: d.day,
    label: d.label,
    type: d.type,
    focus: d.focus,
    exercises: d.exercises.map((e, i) => ({
      id: d.day + '-' + i,
      name: e.name,
      sets: parseInt(e.sets) || 3,
      reps: e.reps,
      rest: e.rest || 90,
      cues: e.cues || [],
      video: e.video || '',
      rir: 2
    }))
  }));

  SS('mf_program', program);
  return program;
}

function getSuppsForGoal(goal) {
  const universal = SUPP_RECOMMENDATIONS.universal;
  const goalSpecific = SUPP_RECOMMENDATIONS[goal] || [];
  // Deduplicate by id
  const seen = new Set();
  return [...universal, ...goalSpecific].filter(s => {
    if (seen.has(s.id)) return false;
    seen.add(s.id);
    return true;
  });
}

  }

// ============= BARCODE SCANNER =============
let _scanStream=null;
function openScanner(){
  if(typeof BarcodeDetector==='undefined'){toast('Barcode scanner not supported on this browser');return;}
  // Build fullscreen overlay
  const overlay=document.createElement('div');
  overlay.id='scan-overlay';
  overlay.style.cssText='position:fixed;inset:0;background:#000;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center';
  overlay.innerHTML=`
    <div style="position:relative;width:100%;max-width:480px">
      <video id="scan-video" autoplay playsinline muted style="width:100%;display:block;border-radius:0"></video>
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none">
        <div style="width:70%;aspect-ratio:3/1;border:2px solid var(--green);border-radius:8px;box-shadow:0 0 0 2000px rgba(0,0,0,0.5)"></div>
      </div>
    </div>
    <div style="color:#fff;font-size:13px;margin-top:16px;opacity:0.7">Point camera at barcode</div>
    <button onclick="closeScanner(true)" style="margin-top:20px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;padding:10px 28px;border-radius:20px;font-size:14px;cursor:pointer">Cancel</button>
    <div id="scan-status" style="color:var(--green);font-size:12px;margin-top:10px;height:18px"></div>
  `;
  document.body.appendChild(overlay);
  history.pushState({page:currentPage,modal:false,scanner:true},'',location.href);
  // Start camera
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false})
    .then(stream=>{
      _scanStream=stream;
      const video=document.getElementById('scan-video');
      if(!video){closeScanner(true);return;}
      video.srcObject=stream;
      video.play();
      _runBarcodeLoop(video);
    })
    .catch(err=>{
      closeScanner(true);
      if(err.name==='NotAllowedError')toast('Camera permission denied — enable in browser settings');
      else toast('Camera unavailable: '+err.message);
    });
}
function closeScanner(popHistory){
  if(_scanStream){_scanStream.getTracks().forEach(t=>t.stop());_scanStream=null;}
  const el=document.getElementById('scan-overlay');
  if(el)el.remove();
  // Only call history.back() when user tapped Cancel — not when popstate already handled it
  if(popHistory)history.back();
}
async function _runBarcodeLoop(video){
  const detector=new BarcodeDetector({formats:['ean_13','ean_8','upc_a','upc_e','code_128','code_39','itf','qr_code']});
  let scanning=true;
  const statusEl=()=>document.getElementById('scan-status');
  while(scanning){
    // Stop if overlay was closed
    if(!document.getElementById('scan-overlay')){scanning=false;break;}
    if(video.readyState===video.HAVE_ENOUGH_DATA){
      try{
        const barcodes=await detector.detect(video);
        if(barcodes.length){
          const code=barcodes[0].rawValue;
          if(statusEl())statusEl().textContent='Found: '+code+' — searching…';
          scanning=false;
          closeScanner(false);
          await searchByUPC(code);
          return;
        }
      }catch(e){/* frame not ready — continue */}
    }
    // ~10 fps scan rate — fast enough, not battery-intensive
    await new Promise(r=>setTimeout(r,100));
  }
}
async function searchByUPC(upc){
  const key=S('mf_api_key','');
  // Put the UPC in the search box so the user can see what was scanned
  const searchInput=document.getElementById('searchIn');
  if(searchInput)searchInput.value=upc;
  const div=document.getElementById('searchResults');
  if(!div)return;
  if(!key){
    // No API key — open manual entry with UPC pre-filled as name
    openManualEntry();
    const nameField=document.getElementById('manName');
    if(nameField)nameField.value='Scanned item (UPC '+upc+')';
    toast('No API key — enter macros manually');
    return;
  }
  div.innerHTML='<div class="muted" style="padding:10px">Looking up UPC '+upc+'…</div>';
  try{
    // USDA supports UPC lookup via gtinUpc field — query the raw UPC string
    const r=await fetch(`https://api.nal.usda.gov/fdc/v1/foods/search?api_key=${encodeURIComponent(key)}&query=${encodeURIComponent(upc)}&pageSize=5`);
    if(!r.ok){div.innerHTML=`<div class="muted2" style="padding:8px">UPC lookup failed (${r.status}). Try typing the product name instead.</div>`;return;}
    const data=await r.json();
    const foods=(data.foods||[]).filter(f=>
      (f.gtinUpc&&f.gtinUpc===upc)||
      (f.description&&f.description.toLowerCase().includes(upc))
    );
    // If strict UPC match found use those, otherwise fall back to all results
    const results=(foods.length?foods:data.foods||[]).slice(0,10);
    if(!results.length){
      div.innerHTML=`<div class="muted2" style="padding:8px">UPC ${upc} not found in USDA database. <a href="#" onclick="openManualEntry();return false" style="color:var(--green)">Log manually ↗</a></div>`;
      return;
    }
    div.innerHTML=`<div class="muted2" style="padding:4px 0 8px;font-size:11px">📷 UPC ${upc}</div>`+results.map((f,i)=>{
      const k=nutVal(f,'Energy'),p=nutVal(f,'Protein'),c=nutVal(f,'Carbohydrate'),fa=nutVal(f,'Total lipid');
      window['_food_'+i]={name:f.description,k:k,p:p,c:c,f:fa};
      return `<div class="list-item" onclick="openPortion(${i})" style="cursor:pointer">
        <div style="flex:1"><div style="font-weight:600;font-size:13px">${f.description}</div>
        <div class="muted2">${Math.round(k)} kcal / 100g • P${p.toFixed(1)} C${c.toFixed(1)} F${fa.toFixed(1)}</div></div>
        <div style="color:var(--green);font-weight:700">+</div></div>`;
    }).join('');
  }catch(e){
    div.innerHTML='<div class="muted2" style="padding:8px">UPC lookup failed — network error.</div>';
  }
}

function buildComplianceScore(){
  // Look back 7 days (including today). A day counts as:
  //   'logged'   — has food entries
  //   'onTarget' — logged AND within ±100 kcal of calGoal
  //   'missed'   — no entries at all
  // Score = onTarget / 7 * 100 (including missed days as failures)
  const s=getSettings();
  const today=new Date();
  const days7=[];
  for(let i=0;i<7;i++){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const log=S('mf_food_'+dateKey(d),[]);
    const kcal=log.reduce((a,b)=>a+(+b.kcal||0),0);
    const logged=log.length>0;
    const onTarget=logged&&kcal>=s.complianceMin&&kcal<=s.complianceMax;
    const over=logged&&kcal>s.complianceMax;
    const under=logged&&kcal<s.complianceMin;
    days7.push({date:d,logged,kcal,onTarget,over,under,label:d.toLocaleDateString('en-US',{weekday:'short'})});
  }
  days7.reverse(); // oldest first for left-to-right display
  const loggedCount=days7.filter(d=>d.logged).length;
  const onTargetCount=days7.filter(d=>d.onTarget).length;
  const score=Math.round(onTargetCount/7*100);
  const scoreColor=score>=85?'var(--green)':score>=57?'var(--yellow)':'var(--red)';
  const scoreLabel=score>=85?'Strong':score>=57?'Building':'Needs work';
  // Protein compliance: days where logged protein >= 90% of protein goal
  const pGoal=Math.round(s.calGoal*s.protein/100/4);
  const pCompliant=days7.filter(d=>{
    if(!d.logged)return false;
    const log=S('mf_food_'+dateKey(d.date),[]);
    const p=log.reduce((a,b)=>a+(+b.protein||0),0);
    return p>=pGoal*0.9;
  }).length;
  return {days7,loggedCount,onTargetCount,score,scoreColor,scoreLabel,pCompliant,pGoal,complianceMin:s.complianceMin,complianceMax:s.complianceMax};
}

function calcMET(){const w=+document.getElementById('metW').value||0;const m=+document.getElementById('metM').value||0;const t=+document.getElementById('metT').value||0;const kg=w*0.453592;const k=Math.round(m*kg*3.5*(t/60)/200*60);document.getElementById('metResult').innerHTML=`<div class="card" style="margin:0;text-align:center"><div class="bignum" style="color:var(--carbs)">${k}</div><div class="muted2">kcal burned</div><button class="btn primary full" style="margin-top:8px" onclick="logBurn(${k})">Log Burn</button></div>`;}

function restAdd(s){restState.end+=s*1000;tickRest();}

      <div class="row"><div class="field" style="flex:1"><label>Age</label><input type="number" id="rcAge" value="${S('mf_rc_age',35)}"></div><div class="field" style="flex:1"><label>Sex</label><select id="rcSex"><option value="m" ${S('mf_rc_sex','m')==='m'?'selected':''}>Male</option><option value="f" ${S('mf_rc_sex','m')==='f'?'selected':''}>Female</option></select></div></div>

        <option value="1.2" ${S('mf_rc_act','1.55')==='1.2'?'selected':''}>Sedentary</option>

        <option value="1.725" ${S('mf_rc_act','1.55')==='1.725'?'selected':''}>Active</option>

      <button class="btn primary full" onclick="calcRecal()">Calculate</button>

function resetRecalBase(){const wlog=S('mf_weightlog',[]);const cur=wlog.length?wlog[wlog.length-1].weight:getSettings().weight;SS('mf_recal_base',cur);toast('Baseline reset to '+cur+' lbs');renderRecal();}
function calcRecal(){
  const w=+document.getElementById('rcW').value;
  const ft=+document.getElementById('rcFt').value;
  const inch=+document.getElementById('rcIn').value;
  const age=+document.getElementById('rcAge').value;
  const sex=document.getElementById('rcSex').value;
  const act=+document.getElementById('rcAct').value;
  SS('mf_rc_ft',ft);SS('mf_rc_in',inch);SS('mf_rc_age',age);SS('mf_rc_sex',sex);SS('mf_rc_act',act);
  const kg=w*0.453592;const cm=(ft*12+inch)*2.54;
  const bmr=Math.round(sex==='m'?10*kg+6.25*cm-5*age+5:10*kg+6.25*cm-5*age-161);
  const tdee=Math.round(bmr*act);const target=tdee-500;
  const p=Math.round(w);const fG=Math.round(target*0.25/9);const cG=Math.round((target-p*4-fG*9)/4);
  document.getElementById('recalResult').innerHTML=`
    <div class="card" style="margin:0">
      <div class="ing-row"><div>BMR</div><div></div><div class="mac">${bmr} kcal</div></div>
      <div class="ing-row"><div>TDEE</div><div></div><div class="mac">${tdee} kcal</div></div>
      <div class="ing-row" style="font-weight:700"><div>Target</div><div></div><div class="mac" style="color:var(--green)">${target} kcal</div></div>
      <div class="ing-row"><div>Protein</div><div></div><div class="mac" style="color:var(--protein)">${p}g</div></div>
      <div class="ing-row"><div>Carbs</div><div></div><div class="mac" style="color:var(--carbs)">${cG}g</div></div>
      <div class="ing-row"><div>Fat</div><div></div><div class="mac" style="color:var(--fat)">${fG}g</div></div>
    </div>
    <button class="btn primary full" style="margin-top:10px" onclick="applyRecal(${target},${p},${cG},${fG},${w})">Apply to Goals</button>
  `;
}
function applyRecal(target,p,c,f,w){
  const s=getSettings();
  const pct_p=Math.round(p*4/target*100);
  const pct_c=Math.round(c*4/target*100);
  const pct_f=100-pct_p-pct_c;
  s.calGoal=target;s.protein=pct_p;s.carbs=pct_c;s.fat=pct_f;s.weight=w;
  saveSettings(s);SS('mf_last_recal_weight',w);toast('Goals updated');renderRecal();
}

// ============= RENDER: WEIGHT =============
function renderWeight(){
  const wlog=S('mf_weightlog',[]).slice().sort((a,b)=>new Date(a.date)-new Date(b.date));
  const cur=wlog.length?wlog[wlog.length-1].weight:0;
  const start=Math.max(wlog.length?wlog[0].weight:270, 270); // 270 is program start
  const lost=start-cur;const goal=180;
  const togo=cur-goal;const journey=lost>0&&(start-goal)>0?Math.min(100,lost/(start-goal)*100):0;

  // 7-day rolling rate
  let ratePillHtml='';
  if(wlog.length>=2){
    const now7=new Date();now7.setDate(now7.getDate()-7);
    const recent=wlog.filter(e=>new Date(e.date)>=now7);
    if(recent.length>=2){
      const weekLoss=recent[0].weight-recent[recent.length-1].weight;
      const days=(new Date(recent[recent.length-1].date)-new Date(recent[0].date))/(86400000)||7;
      const rate=((weekLoss/days)*7).toFixed(2);
      const rateNum=parseFloat(rate);
      const cls=rateNum>=1&&rateNum<=1.5?'good':rateNum>1.5?'fast':'slow';
      const label=rateNum>=1&&rateNum<=1.5?'On Track':rateNum>1.5?'Too Fast — Watch Muscle':'Too Slow / No Data';
      ratePillHtml=`<div style="margin-top:10px"><span class="rate-pill ${cls}">📉 ${rate} lbs/wk avg · ${label}</span></div>`;
    }
  }

  // Sunday canonical indicator
  const todayIsSun=new Date().getDay()===0;
  const todayKey=dateKey();
  const hasSunEntry=wlog.some(e=>e.date===todayKey);
  const sunBadge=todayIsSun&&!hasSunEntry?`<div class="muted2" style="color:var(--yellow);font-size:12px;margin-top:4px">⚠ Sunday weigh-in not yet logged today</div>`:'';

  document.getElementById('weight-body').innerHTML=`
    <div class="card">
      <h3>Log Today</h3>
      <div class="row"><input type="number" id="wIn" step="0.1" placeholder="${cur||'270'}"><button class="btn primary" onclick="logWeight()">LOG</button></div>
      ${sunBadge}
    </div>

function drawWeightChart(data){
  const c=document.getElementById('wChart');if(!c||!data.length)return;
  const dpr=window.devicePixelRatio||1;const w=c.clientWidth;const h=200;
  c.width=w*dpr;c.height=h*dpr;
  const ctx=c.getContext('2d');ctx.scale(dpr,dpr);
  const pad=30;const cw=w-pad*2;const ch=h-pad*2;
  const ws=data.map(d=>+d.weight);
  const goal=180;
  const min=Math.min(...ws,goal)-2;const max=Math.max(...ws)+2;
  const x=i=>data.length>1?pad+(i/(data.length-1))*cw:pad+cw/2;
  const y=v=>pad+(1-(v-min)/(max-min))*ch;
  // axes
  ctx.strokeStyle='#1E3A5F';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(pad,pad);ctx.lineTo(pad,pad+ch);ctx.lineTo(pad+cw,pad+ch);ctx.stroke();
  // goal line
  ctx.strokeStyle='#F87171';ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(pad,y(goal));ctx.lineTo(pad+cw,y(goal));ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#F87171';ctx.font='10px DM Sans';ctx.fillText('Goal '+goal,pad+4,y(goal)-4);
  // rolling avg
  if(data.length>=2){
    ctx.strokeStyle='#A78BFA';ctx.lineWidth=1.5;ctx.beginPath();
    for(let i=0;i<data.length;i++){
      const a=Math.max(0,i-6);const slice=ws.slice(a,i+1);const avg=slice.reduce((p,c)=>p+c,0)/slice.length;
      if(i===0)ctx.moveTo(x(i),y(avg));else ctx.lineTo(x(i),y(avg));
    }
    ctx.stroke();
  }
  // main line
  ctx.strokeStyle='#34D399';ctx.lineWidth=2;ctx.beginPath();
  data.forEach((d,i)=>{if(i===0)ctx.moveTo(x(i),y(+d.weight));else ctx.lineTo(x(i),y(+d.weight));});
  ctx.stroke();
  // points
  ctx.fillStyle='#34D399';data.forEach((d,i)=>{ctx.beginPath();ctx.arc(x(i),y(+d.weight),3,0,Math.PI*2);ctx.fill();});
  // y labels
  ctx.fillStyle='#6B82A8';ctx.font='10px DM Sans';
  ctx.fillText(Math.round(max),4,pad+4);
  ctx.fillText(Math.round(min),4,pad+ch);
}

  {id:'walmart', name:'Walmart',      emoji:'🛒', url:'https://www.walmart.com/search?q='},

];

function buildShoppingList(){
  // Pull from the user's meal plan ingredients (same source as Prep tab)
  const plan = getMealPlan();
  const hasplan = plan && plan.some(d=>d.meals && d.meals.length>0);
  const aggMap = {};

  if(hasplan){
    plan.forEach(day=>{
      (day.meals||[]).forEach(meal=>{
        (meal.ing||[]).forEach(ing=>{
          const key=(ing.n||ing.name||'').toLowerCase().trim();
          if(!key) return;
          const name = ing.n||ing.name||key;
          const unit = ing.m||'';
          if(!aggMap[key]){
            aggMap[key]={id:'shop-'+key.replace(/\W+/g,'-'),name,unit,days:[],kcal:ing.k||0};
          }
          aggMap[key].days.push(day.day);
        });
      });
    });
  }

  // Add user custom prep items
  const userItems = S('mf_prep_custom',[]);
  userItems.forEach(it=>{
    const key=(it.name||'').toLowerCase().trim();
    if(!key||aggMap[key]) return;
    aggMap[key]={id:'shop-custom-'+key.replace(/\W+/g,'-'),name:it.name,unit:it.qty||'',days:[],kcal:0};
  });

  return Object.values(aggMap).sort((a,b)=>a.name.localeCompare(b.name));
}

function sendAllToStore(){

function initSmoothieBuilder(){

function smoothieMacros(b){
  // per-gram rates derived from SMOOTHIE_ING ingredient entries
  const proteinPer100={k:391,p:69.8,c:11.2,f:7.0};  // Protein powder: ~130kcal/35g per scoop
  const berriesPer100={k:44,p:0.5,c:9.5,f:0.25}; // berries 200g: 88kcal P1 C19 F0.5
  const spinachPer100={k:14,p:1.7,c:1.7,f:0.26}; // spinach 115g: 16kcal P2 C2 F0.3
  const waterPer100={k:4,p:0,c:0.4,f:0.2};
  const scale=(ing,g)=>({k:ing.k*g/100,p:ing.p*g/100,c:ing.c*g/100,f:ing.f*g/100});
  const tot=[scale(proteinPer100,b.protein),scale(berriesPer100,b.berries),scale(spinachPer100,b.spinach),scale(waterPer100,b.water)];
  return{k:Math.round(tot.reduce((a,x)=>a+x.k,0)),p:Math.round(tot.reduce((a,x)=>a+x.p,0)),c:Math.round(tot.reduce((a,x)=>a+x.c,0)),f:Math.round(tot.reduce((a,x)=>a+x.f,0))};
}

// Builds a deduplicated list of every distinct ingredient in MEAL_PLAN + SMOOTHIE_ING.
// Shows plan values. With API key, fetches USDA match and shows delta side-by-side.

function buildIngredientRegistry(){
  const seen={};
  // Add smoothie ingredients
  SMOOTHIE_ING.forEach(i=>{
    const key=i.n.toLowerCase().trim();
    if(!seen[key]) seen[key]={name:i.n,grams:i.m,k:i.k,p:i.p,c:i.c,f:i.f};
  });
  // Add all meal plan ingredients
  getMealPlan().forEach(day=>{
    day.meals.forEach(meal=>{
      (meal.ing||[]).forEach(i=>{
        const key=i.n.toLowerCase().trim();
        if(!seen[key]) seen[key]={name:i.n,grams:i.m,k:i.k,p:i.p,c:i.c,f:i.f};
      });
    });
  });
  return Object.values(seen).sort((a,b)=>a.name.localeCompare(b.name));
}

async function runVerifySearch(){
  const q=(document.getElementById('vSearch')||{}).value||window._vSearchQuery||'';
  if(!q.trim()){toast('Enter a food to search');return;}
  window._vSearchQuery=q.trim();
  toast('Searching USDA...');
  try{
    const url='https://api.nal.usda.gov/fdc/v1/foods/search?query='+encodeURIComponent(q.trim())+'&pageSize=15&api_key=DEMO_KEY';
    const resp=await fetch(url);const data=await resp.json();
    const dtLabel={'Foundation':'Foundation','SR Legacy':'SR Legacy','Branded':'Branded','Survey (FNDDS)':'Survey'};
    window._vSearchResults=(data.foods||[]).map(f=>({
      name:f.description,brand:f.brandOwner||f.brandName||'',
      dataType:dtLabel[f.dataType]||f.dataType||'',fdcId:f.fdcId,
      kcal:Math.round((f.foodNutrients||[]).find(n=>n.nutrientId===1008||((n.nutrientName||'').includes('Energy')))?.value||0),
      protein:+(((f.foodNutrients||[]).find(n=>n.nutrientId===1003||((n.nutrientName||'').includes('Protein')))?.value||0).toFixed(1)),
      carbs:+(((f.foodNutrients||[]).find(n=>n.nutrientId===1005||((n.nutrientName||'').toLowerCase().includes('carbohydrate')))?.value||0).toFixed(1)),
      fat:+(((f.foodNutrients||[]).find(n=>n.nutrientId===1004||((n.nutrientName||'').toLowerCase().includes('total lipid')))?.value||0).toFixed(1)),
    }));
    renderVerify();
  }catch(err){toast('Search failed');console.error(err);}
}
function setVFilter(v){
  window._vFilter=v;
  // Only re-render the table rows, not the entire page — preserves input focus
  const filter=v.toLowerCase();

  const filtered=filter?registry.filter(i=>i.name.toLowerCase().includes(filter)):registry;
  const apiKey=S('mf_api_key','');
  const tbody=document.querySelector('#verify-table tbody');
  if(!tbody){renderVerify();return;}
  tbody.innerHTML=filtered.map((ing,idx)=>{
    const key=ing.name.toLowerCase().trim();
    const cached=results[key];
    const computed=Math.round(ing.p*4+ing.c*4+ing.f*9);
    const diff=ing.k-computed;
    const diffTag=Math.abs(diff)>15?`<span style="color:var(--red);font-weight:700"> (${diff>0?'+':''}${diff})</span>`:
                  Math.abs(diff)>5?`<span style="color:var(--yellow)"> (${diff>0?'+':''}${diff})</span>`:'';
    let usdaCell='';
    if(cached==='loading'){usdaCell=`<span style="color:var(--muted)">…</span>`;}
    else if(cached==='error'){usdaCell=`<span style="color:var(--red)">err</span>`;}
    else if(cached==='none'){usdaCell=`<span style="color:var(--muted2)">n/a</span>`;}
    else if(cached){
      const dk=cached.k-ing.k,dp=cached.p-ing.p,dc=cached.c-ing.c,df=cached.f-ing.f;
      const anyDiff=Math.abs(dk)>10||Math.abs(dp)>3||Math.abs(dc)>3||Math.abs(df)>2;
      usdaCell=`<button class="btn sm" style="font-size:10px;padding:3px 6px;${anyDiff?'border-color:var(--yellow);color:var(--yellow)':'border-color:var(--green);color:var(--green)'}" onclick="showUsdaDetail('${key.replace(/'/g,"\\'")}')">
        ${anyDiff?'⚠ Δ':'✓ OK'}
      </button>`;
    }else{
      usdaCell=`<button class="btn sm" style="font-size:10px;padding:3px 6px" onclick="fetchUsda('${key.replace(/'/g,"\\'")}','${ing.name.replace(/'/g,"\\'")}',${ing.k},${ing.p},${ing.c},${ing.f},'${ing.grams}')">Fetch</button>`;
    }
    return `<tr style="border-bottom:1px solid var(--border);${idx%2===0?'background:var(--surface)':'background:var(--surface2)}'}">
      <td style="padding:7px 6px;font-weight:600;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ing.name}</td>
      <td style="padding:7px 4px;text-align:center;color:var(--muted)">${ing.grams}</td>
      <td style="padding:7px 4px;text-align:center">${ing.k}${diffTag}</td>
      <td style="padding:7px 4px;text-align:center;color:var(--protein)">${ing.p}</td>
      <td style="padding:7px 4px;text-align:center;color:var(--carbs)">${ing.c}</td>
      <td style="padding:7px 4px;text-align:center;color:var(--fat)">${ing.f}</td>
      <td style="padding:7px 4px;text-align:center">${usdaCell}</td>
    </tr>`;
  }).join('');
  const emptyEl=document.getElementById('verify-empty');
  if(emptyEl) emptyEl.style.display=filtered.length===0?'block':'none';
}
function clearVFilter(){window._vFilter='';const el=document.getElementById('vFilter');if(el)el.value='';setVFilter('');}

async function fetchUsda(key,name,pk,pp,pc,pf,grams){
  const apiKey=S('mf_api_key','');
  if(!apiKey){toast('No API key saved — add it in Nutrition → Food');return;}
  const cache=S('mf_verify_cache',{});
  cache[key]='loading';
  SS('mf_verify_cache',cache);
  renderVerify();
  try{
    // Clean name for USDA query: strip parentheticals, special chars, limit to core ingredient
    const cleanName=name.replace(/\([^)]*\)/g,'').replace(/[+\/]/g,' ').replace(/\s+/g,' ').trim().split(' ').slice(0,4).join(' ');
    const r=await fetch(`https://api.nal.usda.gov/fdc/v1/foods/search?api_key=${encodeURIComponent(apiKey)}&query=${encodeURIComponent(cleanName)}&pageSize=5`);
    if(!r.ok){
      console.error('USDA fetchUsda error',r.status,name);
      const c=S('mf_verify_cache',{});c[key]='error';SS('mf_verify_cache',c);
      renderVerify();return;
    }
    const data=await r.json();
    const foods=data.foods||[];
    if(!foods.length){
      const c=S('mf_verify_cache',{});c[key]='none';SS('mf_verify_cache',c);
      renderVerify();return;
    }
    // Pick best match: prefer exact name match, else first result
    const best=foods.find(f=>f.description.toLowerCase().includes(name.toLowerCase().split(' ')[0]))||foods[0];
    const kcal=nutVal(best,'Energy');
    const prot=nutVal(best,'Protein');
    const carb=nutVal(best,'Carbohydrate');
    const fat =nutVal(best,'Total lipid');
    // Extract gram amount from grams string for scaling
    const gMatch=grams.match(/(\d+(?:\.\d+)?)\s*g/);
    const gNum=gMatch?+gMatch[1]:100;
    const scale=gNum/100;
    const c=S('mf_verify_cache',{});
    c[key]={
      usdaName:best.description,
      fdcId:best.fdcId,
      per100:{k:Math.round(kcal),p:+prot.toFixed(1),c:+carb.toFixed(1),f:+fat.toFixed(1)},
      scaled:{k:Math.round(kcal*scale),p:Math.round(prot*scale*10)/10,c:Math.round(carb*scale*10)/10,f:Math.round(fat*scale*10)/10},
      // plan values for comparison
      plan:{k:pk,p:pp,c:pc,f:pf,grams:grams}
    };
    SS('mf_verify_cache',c);
    renderVerify();
  }catch(e){
    const c=S('mf_verify_cache',{});c[key]='error';SS('mf_verify_cache',c);
    renderVerify();
  }
}

function showUsdaDetail(key){
  const cache=S('mf_verify_cache',{});
  const d=cache[key];
  if(!d||typeof d==='string') return;
  const plan=d.plan;
  const usda=d.scaled;
  function row(label,pv,uv,unit=''){
    const diff=Math.round((uv-pv)*10)/10;
    const col=Math.abs(diff)>10?'var(--red)':Math.abs(diff)>3?'var(--yellow)':'var(--green)';
    return `<div class="ing-row">
      <div>${label}</div>
      <div style="color:var(--muted)">${pv}${unit} plan</div>
      <div class="mac">${uv}${unit} USDA <span style="color:${col}">${diff>0?'+':''}${diff}</span></div>
    </div>`;
  }
  openModal(`
    <h3 style="font-size:14px;margin-bottom:4px">${d.usdaName}</h3>
    <div class="muted2" style="margin-bottom:10px">FDC ID: ${d.fdcId} · Serving: ${plan.grams}</div>
    <div style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:6px;font-weight:600">Plan vs USDA (at serving size)</div>
    ${row('kcal',plan.k,usda.k)}
    ${row('Protein',plan.p,usda.p,'g')}
    ${row('Carbs',plan.c,usda.c,'g')}
    ${row('Fat',plan.f,usda.f,'g')}
    <div class="muted2" style="margin-top:10px;font-size:11px">Positive = USDA higher than plan · Negative = plan higher than USDA</div>
    <div class="row" style="margin-top:12px;gap:8px">
      <button class="btn full" onclick="closeModal()">Close</button>
      <button class="btn primary full" onclick="applyUsdaValues('${key}')">Apply USDA Values</button>
    </div>
  `);
}

function applyUsdaValues(key){
  // This cannot automatically update MEAL_PLAN constants (they are runtime JS, not editable).
  // Instead, show the user what values to update manually, or use override storage.
  const cache=S('mf_verify_cache',{});
  const d=cache[key];
  if(!d||typeof d==='string') return;
  const u=d.scaled;
  const overrides=S('mf_verify_overrides',{});
  overrides[key]={k:u.k,p:u.p,c:u.c,f:u.f,source:'USDA FDC '+d.fdcId};
  SS('mf_verify_overrides',overrides);
  closeModal();
  toast('USDA values saved as override note');
  // Show confirmation with what changed
  const plan=d.plan;
  openModal(`<h3>Override Saved</h3>
    <div class="muted2" style="margin-bottom:10px">USDA values recorded. The meal plan display shows plan values — overrides are reference notes only and do not change your food log calculations.</div>
    <div class="ing-row"><div>kcal</div><div>${plan.k}→${u.k}</div><div class="mac" style="color:var(--green)">saved</div></div>
    <div class="ing-row"><div>Protein</div><div>${plan.p}→${u.p}g</div><div class="mac" style="color:var(--green)">saved</div></div>
    <div class="ing-row"><div>Carbs</div><div>${plan.c}→${u.c}g</div><div class="mac" style="color:var(--green)">saved</div></div>
    <div class="ing-row"><div>Fat</div><div>${plan.f}→${u.f}g</div><div class="mac" style="color:var(--green)">saved</div></div>
    <div class="muted2" style="margin-top:10px">To update the plan permanently, note these values and share them — the HTML data constants will be corrected.</div>
    <button class="btn primary full" style="margin-top:10px" onclick="closeModal();renderVerify()">Done</button>
  `);
}

// ── Back-swipe / popstate handler ────────────────────────────────────────────
window.addEventListener('popstate', e=>{
  const st=e.state;
  if(!st){return;} // no state — let browser handle it
  // Scanner open → close it
  if(document.getElementById('scan-overlay')){
    closeScanner(false); // false = popstate already moved back, don't call history.back() again
    return;
  }
  // Modal open → close it
  if(document.getElementById('modal').classList.contains('open')){
    closeModal();
    return;
  }
  // Page navigation → restore previous page
  if(st.page){
    _historyNav=true;
    setPage(st.page);
    _historyNav=false;
  }
});

setInterval(()=>{if(currentPage==='fasting'){renderFasting();}},30000);

// ── Service Worker registration ───────────────────────────────────────────────
// Guard: only register on real deployed hosts (GitHub Pages, custom domain).
// Skips silently in sandboxed preview environments (claude.ai, localhost dev).
const _swHost = location.hostname;
const _swOk = _swHost !== 'www.claudeusercontent.com'
           && !_swHost.endsWith('.claudeusercontent.com')
           && _swHost !== ''
           && _swHost !== 'localhost'
           && _swHost !== '127.0.0.1';
if('serviceWorker' in navigator && _swOk){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('/delt/sw.js')
      .catch(()=>{}); // silent — sw.js may not exist yet during early deploy
  });
}
